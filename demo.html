<!DOCTYPE html>
<html>
<head>
    <title>Pay ₹1 ₹2 ₹3</title>
</head>
<body>

<h2>Select Amount</h2>

<button onclick="pay(1)">Pay ₹1</button>
<button onclick="pay(2)">Pay ₹2</button>
<button onclick="pay(3)">Pay ₹3</button>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<script>
async function pay(amount) {

    const res = await fetch("http://localhost:5000/create-order", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ amount: amount })
    });

    const order = await res.json();

    var options = {
        "key": "rzp_live_SV68ifsBjM5tPz",
        "amount": order.amount,
        "currency": "INR",
        "name": "My Payment App",
        "description": "Test Payment",
        "order_id": order.id,
        "handler": function (response){
            alert("Payment Successful!");
            console.log(response);
        },
        "prefill": {
            "name": "Test User",
            "email": "dakshitkalitkar@gmail.com",
            "contact": "9220059256"
        },
        "theme": {
            "color": "#3399cc"
        }
    };

    var rzp = new Razorpay(options);
    rzp.open();
}
</script>

</body>
</html>
