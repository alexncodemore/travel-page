<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>포토부스 · Korean Photo Booth</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,600;1,500;1,700&family=Nanum+Pen+Script&display=swap');

:root {
  --rose:#f9a8c9;--rose-deep:#e8698a;--rose-dark:#c04e72;
  --lilac:#c4b0f0;--lilac-deep:#9b85d9;
  --sky:#a8d4f5;--mint:#a8e6cf;--peach:#fcd5b5;
  --text:#3d2c4a;--text-mid:#7a6490;--text-light:#b0a0c0;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'DM Sans',sans-serif;
  background:#fdf0f6;min-height:100vh;color:var(--text);overflow-x:hidden;
}
body::before{
  content:'';position:fixed;inset:0;z-index:0;
  background:
    radial-gradient(ellipse 80% 60% at 10% 15%,rgba(249,168,201,.22) 0%,transparent 55%),
    radial-gradient(ellipse 60% 80% at 90% 85%,rgba(196,176,240,.2) 0%,transparent 55%),
    radial-gradient(ellipse 70% 50% at 55% 45%,rgba(168,212,245,.13) 0%,transparent 65%);
  pointer-events:none;
}
#app{
  position:relative;z-index:1;
  display:flex;flex-direction:column;align-items:center;
  min-height:100vh;padding:24px 14px 60px;
}

/* ── Header ── */
.app-header{text-align:center;margin-bottom:20px}
.header-badge{
  display:inline-flex;align-items:center;gap:7px;
  background:rgba(255,255,255,.88);border:1.5px solid rgba(232,105,138,.18);
  border-radius:100px;padding:5px 16px;
  font-size:10px;letter-spacing:3px;text-transform:uppercase;
  color:var(--rose-deep);font-weight:600;margin-bottom:8px;
}
.badge-dot{width:5px;height:5px;border-radius:50%;background:var(--rose-deep);animation:breathe 2s ease-in-out infinite}
@keyframes breathe{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.7)}}
.logo{
  font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:700;
  font-size:clamp(30px,6vw,46px);letter-spacing:-.5px;line-height:1;
  background:linear-gradient(135deg,var(--rose-dark) 0%,var(--lilac-deep) 50%,#6ab4e8 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}

/* ── Step bar ── */
.step-bar{display:flex;align-items:center;margin-bottom:20px}
.sdot{
  width:9px;height:9px;border-radius:50%;background:rgba(196,176,240,.3);
  transition:all .45s cubic-bezier(.34,1.56,.64,1);
}
.sline{width:32px;height:1.5px;background:rgba(196,176,240,.25);transition:background .4s}
.sdot.active{background:var(--rose-deep);transform:scale(1.6);box-shadow:0 0 0 4px rgba(232,105,138,.18)}
.sdot.done{background:var(--lilac-deep);transform:scale(1.2)}
.sline.done{background:var(--lilac)}

/* ── Card ── */
.card{
  background:rgba(255,255,255,.9);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);
  border-radius:26px;padding:28px 24px;
  box-shadow:0 2px 0 rgba(255,255,255,.95) inset,0 14px 50px rgba(160,100,190,.11),0 2px 8px rgba(160,100,190,.07);
  width:100%;max-width:430px;border:1px solid rgba(255,255,255,.92);
}

/* ── Welcome ── */
.welcome-art{width:80px;height:80px;margin:0 auto 16px;position:relative;display:flex;align-items:center;justify-content:center}
.wa-ring{position:absolute;inset:0;border-radius:50%;border:1.5px solid rgba(249,168,201,.45);animation:wspin 9s linear infinite}
.wa-ring2{inset:11px;animation:wspin 5.5s linear infinite reverse;border-color:rgba(196,176,240,.5)}
.wa-core{
  position:absolute;inset:22px;border-radius:50%;
  background:linear-gradient(135deg,var(--rose),var(--lilac));
  display:flex;align-items:center;justify-content:center;font-size:18px;
  box-shadow:0 4px 18px rgba(232,105,138,.28);
}
@keyframes wspin{to{transform:rotate(360deg)}}

.section-title{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:25px;color:var(--text);text-align:center;margin-bottom:5px}
.section-sub{font-size:13px;color:var(--text-light);text-align:center;margin-bottom:22px;line-height:1.6}

.input-group{margin-bottom:12px}
.input-group label{display:flex;align-items:center;gap:6px;font-size:10.5px;font-weight:600;color:var(--text-mid);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px}
.lico{width:16px;height:16px;border-radius:5px;background:linear-gradient(135deg,var(--rose),var(--lilac));display:inline-flex;align-items:center;justify-content:center;font-size:8px;color:#fff;flex-shrink:0}
.input-group input,.input-group textarea{
  width:100%;padding:11px 14px;
  border:1.5px solid rgba(196,176,240,.3);border-radius:12px;
  font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);
  background:rgba(255,255,255,.8);outline:none;resize:none;
  transition:border-color .2s,box-shadow .2s,background .2s;
}
.input-group input:focus,.input-group textarea:focus{border-color:var(--rose-deep);box-shadow:0 0 0 4px rgba(232,105,138,.09);background:#fff}
.input-group input::placeholder,.input-group textarea::placeholder{color:#d8c8e8}

/* Theme selector */
.theme-label{font-size:10.5px;font-weight:600;color:var(--text-mid);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.theme-row{display:flex;gap:7px;margin-bottom:14px}
.theme-btn{
  flex:1;padding:8px 4px;border:1.5px solid rgba(196,176,240,.25);border-radius:11px;
  background:rgba(255,255,255,.7);cursor:pointer;font-family:'DM Sans',sans-serif;
  font-size:10.5px;font-weight:600;color:var(--text-mid);text-align:center;
  transition:all .2s;
}
.theme-btn .tswatch{display:block;width:26px;height:6px;border-radius:4px;margin:0 auto 5px}
.theme-btn.sel{border-color:var(--rose-deep);background:rgba(232,105,138,.08);color:var(--rose-deep)}

/* Buttons */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:13px 22px;border:none;border-radius:100px;cursor:pointer;
  font-family:'DM Sans',sans-serif;font-size:14.5px;font-weight:600;
  transition:transform .2s cubic-bezier(.34,1.56,.64,1),box-shadow .2s;
  width:100%;margin-top:9px;
}
.btn:hover{transform:translateY(-2px) scale(1.01)}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.42;cursor:not-allowed;transform:none!important}
.btn-primary{background:linear-gradient(135deg,var(--rose-dark),var(--rose-deep) 45%,var(--lilac-deep));color:#fff;box-shadow:0 4px 20px rgba(220,80,120,.3)}
.btn-primary:hover{box-shadow:0 8px 28px rgba(220,80,120,.42)}
.btn-dl{background:linear-gradient(135deg,#6ac8a8,#4db090);color:#1a5040;box-shadow:0 4px 18px rgba(74,180,140,.28);font-size:15px}
.btn-dl:hover{box-shadow:0 8px 26px rgba(74,180,140,.4)}
.btn-ghost{background:rgba(196,176,240,.1);color:var(--text-mid);border:1.5px solid rgba(196,176,240,.28);box-shadow:none;font-size:13px;margin-top:7px}
.btn-ghost:hover{background:rgba(196,176,240,.2);transform:none}

/* Camera screen */
.cam-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cam-title{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:21px;color:var(--text)}
.chips{display:flex;gap:5px}
.chip{
  width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:10.5px;font-weight:700;background:rgba(196,176,240,.18);color:var(--text-light);
  border:1.5px solid rgba(196,176,240,.28);transition:all .4s cubic-bezier(.34,1.56,.64,1);
}
.chip.taken{background:linear-gradient(135deg,var(--rose-deep),var(--lilac-deep));color:#fff;border-color:transparent;transform:scale(1.18);box-shadow:0 2px 10px rgba(232,105,138,.35)}

/* ── CAMERA VIEWPORT: padding-bottom trick for perfect 3:4 on all devices ── */
.camera-outer{
  position:relative;
  width:100%;
  padding-bottom:133.33%;   /* 4/3 * 100% = perfect 3:4 portrait */
  border-radius:18px;
  overflow:hidden;
  background:#18082a;
  box-shadow:0 8px 32px rgba(90,40,110,.22);
  margin-bottom:12px;
}
.camera-inner{
  position:absolute;
  inset:0;
}
#video{
  width:100%;height:100%;
  object-fit:cover;
  display:block;
  transform:scaleX(-1);
}
.cam-vignette{
  position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(ellipse at center,transparent 60%,rgba(18,8,26,.28) 100%);
}
.flash-overlay{position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none}
.flash-overlay.flash{animation:fl .5s ease-out forwards}
@keyframes fl{0%{opacity:1}100%{opacity:0}}
.cd-wrap{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:5}
.cd-num{
  font-family:'Cormorant Garamond',serif;font-weight:700;font-style:italic;
  font-size:clamp(80px,22vw,130px);
  color:rgba(255,255,255,.95);
  text-shadow:0 0 60px rgba(255,150,200,.7),0 4px 24px rgba(0,0,0,.22);
  opacity:0;transform:scale(.5);
}
.cd-num.show{animation:cpop .95s ease forwards}
@keyframes cpop{0%{opacity:1;transform:scale(.5)}40%{transform:scale(1.18)}70%{transform:scale(.95);opacity:1}100%{transform:scale(1.05);opacity:0}}

/* Thumbnails — 3:4 ratio */
.thumbs{display:flex;gap:8px;justify-content:center;margin-top:4px}
.thumb{
  width:54px;height:72px;   /* strict 3:4 */
  border-radius:9px;object-fit:cover;
  border:2px solid rgba(249,168,201,.6);
  box-shadow:0 3px 12px rgba(180,100,140,.18);
  animation:tpop .4s cubic-bezier(.34,1.56,.64,1) forwards;transform:scale(0);
}
@keyframes tpop{to{transform:scale(1)}}

/* Strip result */
.strip-result{text-align:center}
.strip-scroll{overflow:auto;display:flex;justify-content:center;padding:4px 0 8px;margin:12px 0 12px;max-height:70vh}
#stripCanvas{
  border-radius:14px;flex-shrink:0;
  box-shadow:0 14px 60px rgba(140,70,160,.2),0 2px 0 rgba(255,255,255,.85) inset;
  animation:sr .7s cubic-bezier(.22,1,.36,1) forwards;
  transform:scale(.85) translateY(16px);opacity:0;
}
@keyframes sr{to{transform:scale(1) translateY(0);opacity:1}}

.step-screen{animation:si .45s cubic-bezier(.22,1,.36,1) forwards;opacity:0;transform:translateY(18px)}
@keyframes si{to{opacity:1;transform:translateY(0)}}
.hidden{display:none!important}
</style>
</head>
<body>
<div id="app">

  <header class="app-header">
    <div class="header-badge"><span class="badge-dot"></span>Korean Photo Booth</div>
    <div class="logo">포토부스</div>
  </header>

  <div class="step-bar">
    <div class="sdot active" id="dot1"></div>
    <div class="sline" id="ln1"></div>
    <div class="sdot" id="dot2"></div>
    <div class="sline" id="ln2"></div>
    <div class="sdot" id="dot3"></div>
  </div>

  <!-- SCREEN 1 -->
  <div class="card step-screen" id="welcomeScreen">
    <div class="welcome-art">
      <div class="wa-ring"></div>
      <div class="wa-ring wa-ring2"></div>
      <div class="wa-core">📷</div>
    </div>
    <h1 class="section-title">어서오세요!</h1>
    <p class="section-sub">Three photos, one beautiful memory.<br>Choose your theme &amp; smile!</p>

    <div class="input-group">
      <label><span class="lico">✦</span>Your Name</label>
      <input type="text" id="userName" placeholder="e.g. Soyeon · 소연" maxlength="28"/>
    </div>
    <div class="input-group">
      <label><span class="lico">♡</span>Your Message</label>
      <textarea id="userMessage" rows="2" placeholder="e.g. 오늘도 행복하게" maxlength="55"></textarea>
    </div>

    <div class="theme-label"><span class="lico">◈</span>Strip Theme</div>
    <div class="theme-row">
      <button class="theme-btn sel" data-theme="blossom" onclick="pickTheme(this)">
        <span class="tswatch" style="background:linear-gradient(90deg,#f9a8c9,#c4b0f0)"></span>Blossom
      </button>
      <button class="theme-btn" data-theme="noir" onclick="pickTheme(this)">
        <span class="tswatch" style="background:linear-gradient(90deg,#2a2040,#5a4a7a)"></span>Noir
      </button>
      <button class="theme-btn" data-theme="cotton" onclick="pickTheme(this)">
        <span class="tswatch" style="background:linear-gradient(90deg,#a8d4f5,#a8e6cf)"></span>Cotton
      </button>
      <button class="theme-btn" data-theme="gold" onclick="pickTheme(this)">
        <span class="tswatch" style="background:linear-gradient(90deg,#f5c842,#e8955a)"></span>Gold
      </button>
    </div>

    <button class="btn btn-primary" onclick="startBooth()">Start Photo Booth &rarr;</button>
  </div>

  <!-- SCREEN 2 -->
  <div class="card step-screen hidden" id="cameraScreen">
    <div class="cam-header">
      <div class="cam-title">Say 치즈!</div>
      <div class="chips">
        <div class="chip" id="ch1">1</div>
        <div class="chip" id="ch2">2</div>
        <div class="chip" id="ch3">3</div>
      </div>
    </div>

    <div class="camera-outer">
      <div class="camera-inner">
        <video id="video" autoplay playsinline muted></video>
        <div class="cam-vignette"></div>
        <div class="flash-overlay" id="flashOverlay"></div>
        <div class="cd-wrap"><div class="cd-num" id="cdNum"></div></div>
      </div>
    </div>

    <div class="thumbs" id="thumbnails"></div>
    <button class="btn btn-primary" id="captureBtn" onclick="startCountdown()">Take Photo <span id="pNum">1</span> of 3</button>
  </div>

  <!-- SCREEN 3 -->
  <div class="card step-screen hidden strip-result" id="stripSection">
    <h2 class="section-title">Your Strip!</h2>
    <p class="section-sub">Download your 포토부스 memory.</p>
    <div class="strip-scroll"><canvas id="stripCanvas"></canvas></div>
    <button class="btn btn-dl" onclick="downloadStrip()">Download Strip</button>
    <button class="btn btn-ghost" onclick="restartBooth()">Take New Photos</button>
  </div>

</div>
<canvas id="captureCanvas" class="hidden"></canvas>

<script>
/* ═══ STATE ═══ */
let userName='',userMessage='',selTheme='blossom';
let photosTaken=0,capturedImages=[],stream=null,isCounting=false;

/* ═══ THEMES ═══ */
const T={
  blossom:{
    bg0:'#fff9fc',bg1:'#fdf4ff',
    h:['#f9a8c9','#c4b0f0','#a8d4f5'],
    f:['#a8d4f5','#c4b0f0','#f9a8c9'],
    accent:'#c04e72',accentSoft:'rgba(196,176,240,.45)',
    nameCol:'#7a4a90',msgCol:'#b090c8',dateCol:'rgba(170,140,200,.6)',
    borderCol:'rgba(200,170,220,.4)',shadowCol:'rgba(180,100,180,.14)',
    pillBg:'rgba(255,255,255,.92)',pillTxt:'#b070c0',
    filmStrip:false,darkBg:false,
    watermark:'포토부스  ·  Blossom',
  },
  noir:{
    bg0:'#1a1525',bg1:'#12101e',
    h:['#2e2040','#4a3a6a','#3a2e55'],
    f:['#2a1e3a','#3a2e55','#2a1e3a'],
    accent:'#c4b0f0',accentSoft:'rgba(196,176,240,.3)',
    nameCol:'#d8c8f8',msgCol:'#a890c8',dateCol:'rgba(196,176,240,.42)',
    borderCol:'rgba(196,176,240,.22)',shadowCol:'rgba(0,0,0,.45)',
    pillBg:'rgba(28,18,44,.92)',pillTxt:'#c4b0f0',
    filmStrip:true,darkBg:true,
    watermark:'포토부스  ·  Noir',
  },
  cotton:{
    bg0:'#f0faff',bg1:'#edf8f4',
    h:['#a8d4f5','#a8e6cf','#fcd5b5'],
    f:['#fcd5b5','#a8e6cf','#a8d4f5'],
    accent:'#4a9aaa',accentSoft:'rgba(168,212,245,.45)',
    nameCol:'#2a7a8a',msgCol:'#6aacb8',dateCol:'rgba(80,160,180,.52)',
    borderCol:'rgba(168,212,245,.42)',shadowCol:'rgba(100,180,200,.14)',
    pillBg:'rgba(255,255,255,.9)',pillTxt:'#4a9aaa',
    filmStrip:false,darkBg:false,
    watermark:'포토부스  ·  Cotton',
  },
  gold:{
    bg0:'#fffbf0',bg1:'#fff8e4',
    h:['#f5c842','#e8a030','#e8955a'],
    f:['#e8955a','#e8a030','#f5c842'],
    accent:'#b06010',accentSoft:'rgba(245,200,66,.42)',
    nameCol:'#8a5010',msgCol:'#c08030',dateCol:'rgba(180,130,40,.52)',
    borderCol:'rgba(245,200,66,.38)',shadowCol:'rgba(200,150,30,.16)',
    pillBg:'rgba(255,255,255,.9)',pillTxt:'#c08030',
    filmStrip:false,darkBg:false,
    watermark:'포토부스  ·  Gold',
  },
};

/* ═══ HELPERS ═══ */
function pickTheme(btn){
  document.querySelectorAll('.theme-btn').forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel');selTheme=btn.dataset.theme;
}
function go(a,b){
  document.getElementById(a).classList.add('hidden');
  const el=document.getElementById(b);
  el.classList.remove('hidden','step-screen');void el.offsetWidth;el.classList.add('step-screen');
}
function dots(active){
  [1,2,3].forEach(i=>{
    const d=document.getElementById('dot'+i);d.classList.remove('active','done');
    if(i<active)d.classList.add('done');if(i===active)d.classList.add('active');
  });
  [1,2].forEach(i=>document.getElementById('ln'+i).classList.toggle('done',i<active));
}

/* ═══ SCREEN 1 ═══ */
function startBooth(){
  const n=document.getElementById('userName').value.trim();
  if(!n){const el=document.getElementById('userName');el.style.borderColor='#e8698a';el.focus();setTimeout(()=>el.style.borderColor='',1400);return;}
  userName=n;
  userMessage=document.getElementById('userMessage').value.trim()||'오늘도 행복하게';
  go('welcomeScreen','cameraScreen');dots(2);initCam();
}

/* ═══ CAMERA ═══ */
async function initCam(){
  try{
    stream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:'user',width:{ideal:1080},height:{ideal:1440}},audio:false
    });
    document.getElementById('video').srcObject=stream;
  }catch(e){alert('Camera access needed.\n\n'+e.message);}
}
function startCountdown(){
  if(isCounting||photosTaken>=3)return;
  isCounting=true;
  const btn=document.getElementById('captureBtn');
  btn.disabled=true;
  btn.innerHTML='Photo '+(photosTaken+1)+' of 3 — smile!';
  let c=3;showCd(c);
  const iv=setInterval(()=>{c--;if(c>0)showCd(c);else{clearInterval(iv);doCapture();}},1000);
}
function showCd(n){
  const el=document.getElementById('cdNum');el.textContent=n;el.classList.remove('show');void el.offsetWidth;el.classList.add('show');
}
function doCapture(){
  const fl=document.getElementById('flashOverlay');fl.classList.remove('flash');void fl.offsetWidth;fl.classList.add('flash');

  const vid=document.getElementById('video');
  const cap=document.getElementById('captureCanvas');
  const vw=vid.videoWidth||720, vh=vid.videoHeight||960;

  /* ── Precise 3:4 center-crop from any camera resolution ── */
  let cw,ch;
  if(vw*4 > vh*3){
    // Wider than 3:4 → constrain by height, crop width
    ch=vh; cw=Math.round(vh*3/4);
  } else {
    // Taller than 3:4 → constrain by width, crop height
    cw=vw; ch=Math.round(vw*4/3);
  }
  const cx=Math.round((vw-cw)/2), cy=Math.round((vh-ch)/2);

  cap.width=cw; cap.height=ch;
  const ctx=cap.getContext('2d');
  ctx.save();ctx.translate(cw,0);ctx.scale(-1,1);
  ctx.drawImage(vid,cx,cy,cw,ch,0,0,cw,ch);
  ctx.restore();

  const url=cap.toDataURL('image/jpeg',.95);
  capturedImages.push(url);photosTaken++;

  document.getElementById('ch'+photosTaken).classList.add('taken');
  const img=new Image();img.src=url;img.className='thumb';
  document.getElementById('thumbnails').appendChild(img);
  isCounting=false;

  if(photosTaken>=3){
    document.getElementById('captureBtn').textContent='Generating strip…';
    setTimeout(()=>{stopCam();buildStrip();},700);
  } else {
    // Show next photo label briefly, then auto-start countdown after 1s
    const btn=document.getElementById('captureBtn');
    btn.disabled=true;
    btn.innerHTML='Get ready… photo <span id="pNum">'+(photosTaken+1)+'</span> of 3';
    setTimeout(()=>{ startCountdown(); },1000);
  }
}
function stopCam(){if(stream){stream.getTracks().forEach(t=>t.stop());stream=null;}}

/* ═══ STRIP BUILDER ═══ */
function buildStrip(){
  go('cameraScreen','stripSection');dots(3);
  const th=T[selTheme];
  const cv=document.getElementById('stripCanvas');
  const ctx=cv.getContext('2d');
  const DPR=2;

  /* Layout */
  const SW=320;
  const PADX=26;
  const PW=SW-PADX*2;          // 268
  const PH=Math.round(PW*4/3); // 357  — strict 3:4
  const HDR=54;
  const GAP=13;
  const FTR=152;
  const PTOP=18;
  const SH=HDR+PTOP+(PH*3)+(GAP*2)+FTR;

  cv.width=SW*DPR; cv.height=SH*DPR;
  cv.style.width=SW+'px'; cv.style.height=SH+'px';
  ctx.scale(DPR,DPR);

  /* Background */
  const bg=ctx.createLinearGradient(0,0,SW,SH);
  bg.addColorStop(0,th.bg0);bg.addColorStop(1,th.bg1);
  ctx.fillStyle=bg;ctx.fillRect(0,0,SW,SH);

  /* Film strip holes for Noir */
  if(th.filmStrip) drawFilm(ctx,SW,SH,HDR);
  else drawSideDash(ctx,SW,SH,HDR,FTR,th.accentSoft);

  /* Header */
  ctx.save();
  const hg=ctx.createLinearGradient(0,0,SW,0);
  hg.addColorStop(0,th.h[0]);hg.addColorStop(.5,th.h[1]);hg.addColorStop(1,th.h[2]);
  ctx.fillStyle=hg;ctx.fillRect(0,0,SW,HDR);ctx.restore();
  // Header decoration dots
  for(let i=0;i<11;i++){ctx.beginPath();ctx.arc(15+i*28,HDR-10,1.4,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,.38)';ctx.fill();}
  // Header text
  ctx.textAlign='center';ctx.font='600 11.5px "DM Sans",sans-serif';
  ctx.fillStyle='rgba(255,255,255,.95)';ctx.fillText(th.watermark,SW/2,HDR/2+4);

  /* Load & draw photos */
  Promise.all(capturedImages.map(s=>loadImg(s))).then(imgs=>{

    imgs.forEach((img,i)=>{
      const py=HDR+PTOP+i*(PH+GAP);

      // Shadow card
      ctx.save();ctx.shadowColor=th.shadowCol;ctx.shadowBlur=18;ctx.shadowOffsetY=7;
      ctx.fillStyle=th.darkBg?'#1a1525':'#fff';
      rr(ctx,PADX-2,py-2,PW+4,PH+4,10);ctx.fill();ctx.restore();

      // Photo clip
      ctx.save();rr(ctx,PADX,py,PW,PH,8);ctx.clip();
      ctx.drawImage(img,PADX,py,PW,PH);
      // Noir tint
      if(th.darkBg){ctx.fillStyle='rgba(40,10,70,.1)';ctx.fillRect(PADX,py,PW,PH);}
      ctx.restore();

      // Photo border
      ctx.save();rr(ctx,PADX,py,PW,PH,8);ctx.strokeStyle=th.borderCol;ctx.lineWidth=1.5;ctx.stroke();ctx.restore();

      // Photo number pill — bottom left
      ctx.save();
      rr(ctx,PADX+6,py+PH-22,22,15,5);
      ctx.fillStyle=th.pillBg;ctx.fill();
      ctx.font='bold 9px "DM Sans",sans-serif';ctx.fillStyle=th.pillTxt;ctx.textAlign='center';
      ctx.fillText('0'+(i+1),PADX+6+11,py+PH-11);ctx.restore();

      // Date stamp on photo 3 — bottom right
      if(i===2){
        const ds=fmtDate();
        ctx.save();ctx.font='400 8px "DM Sans",sans-serif';ctx.textAlign='right';
        const tw=ctx.measureText(ds).width+10;
        rr(ctx,PADX+PW-tw-4,py+PH-21,tw+2,14,4);
        ctx.fillStyle=th.pillBg;ctx.fill();
        ctx.fillStyle=th.pillTxt;ctx.fillText(ds,PADX+PW-6,py+PH-10);ctx.restore();
      }
    });

    /* Divider between photos and footer */
    const divY=HDR+PTOP+3*(PH+GAP)-GAP+10;
    drawFadeRule(ctx,PADX,divY,PW,th.accentSoft);

    /* ─── FOOTER ─── */
    const FY=SH-FTR+10;

    // Decorative dot row
    for(let i=0;i<9;i++){
      ctx.beginPath();ctx.arc(SW/2-64+i*16,FY+6,1.6,0,Math.PI*2);
      ctx.fillStyle=th.accentSoft;ctx.fill();
    }

    // Name
    ctx.textAlign='center';
    ctx.font='italic 700 26px "Cormorant Garamond",serif';
    ctx.fillStyle=th.nameCol;ctx.fillText(userName,SW/2,FY+36);

    // Thin rule under name
    drawFadeRule(ctx,PADX+20,FY+44,PW-40,th.accentSoft);

    // Corner brackets
    drawBracket(ctx,PADX+8,FY+52,th.accentSoft,false);
    drawBracket(ctx,SW-PADX-8,FY+52,th.accentSoft,true);

    // Message
    ctx.font='400 12px "DM Sans",sans-serif';ctx.fillStyle=th.msgCol;
    const wlines=wrapText(ctx,userMessage,PW-8);
    wlines.slice(0,2).forEach((l,i)=>ctx.fillText(l,SW/2,FY+70+i*18));

    // Date + heart
    ctx.font='400 10px "DM Sans",sans-serif';ctx.fillStyle=th.dateCol;
    ctx.fillText('♡   '+fmtDate()+'   ♡',SW/2,FY+112);

    // Spot sticker circles (theme accents)
    if(!th.darkBg) drawSpotAccents(ctx,SW,FY+90,th.accentSoft);

    /* Footer color band */
    ctx.save();
    const fg=ctx.createLinearGradient(0,0,SW,0);
    fg.addColorStop(0,th.f[0]);fg.addColorStop(.5,th.f[1]);fg.addColorStop(1,th.f[2]);
    ctx.fillStyle=fg;ctx.fillRect(0,SH-20,SW,20);
    ctx.font='500 9px "DM Sans",sans-serif';ctx.fillStyle='rgba(255,255,255,.88)';
    ctx.textAlign='center';ctx.fillText('포토부스  ✦  photo booth  ✦  '+fmtDate(),SW/2,SH-7);
    ctx.restore();
  });
}

/* ─── Canvas utils ─── */
function loadImg(src){return new Promise(res=>{const i=new Image();i.onload=()=>res(i);i.src=src;})}
function rr(c,x,y,w,h,r){
  c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.quadraticCurveTo(x+w,y,x+w,y+r);
  c.lineTo(x+w,y+h-r);c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  c.lineTo(x+r,y+h);c.quadraticCurveTo(x,y+h,x,y+h-r);
  c.lineTo(x,y+r);c.quadraticCurveTo(x,y,x+r,y);c.closePath();
}
function drawFadeRule(ctx,x,y,w,col){
  const g=ctx.createLinearGradient(x,0,x+w,0);
  g.addColorStop(0,'transparent');g.addColorStop(.5,col);g.addColorStop(1,'transparent');
  ctx.strokeStyle=g;ctx.lineWidth=.8;ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x+w,y);ctx.stroke();
}
function drawBracket(ctx,x,y,col,flip){
  const d=flip?-1:1;ctx.save();ctx.strokeStyle=col;ctx.lineWidth=1.2;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(x+d*12,y);ctx.lineTo(x,y);ctx.lineTo(x,y+12);ctx.stroke();ctx.restore();
}
function drawSpotAccents(ctx,sw,y,col){
  [[18,y+12,4],[sw-18,y+12,4],[18,y-12,2.5],[sw-18,y-12,2.5]].forEach(([x,cy,r])=>{
    ctx.beginPath();ctx.arc(x,cy,r,0,Math.PI*2);ctx.fillStyle=col;ctx.fill();
  });
}
function drawFilm(ctx,sw,sh,hdr){
  const hw=10,hh=18,hr=3,count=10;
  const avail=sh-hdr-22;const sp=avail/count;
  for(let i=0;i<count;i++){
    const hy=hdr+12+i*sp;
    [[5,hy],[sw-15,hy]].forEach(([hx,hy2])=>{
      rr(ctx,hx,hy2,hw,hh,hr);
      ctx.fillStyle='rgba(0,0,0,.4)';ctx.fill();
      ctx.strokeStyle='rgba(255,255,255,.08)';ctx.lineWidth=.5;ctx.stroke();
    });
  }
}
function drawSideDash(ctx,sw,sh,hdr,ftr,col){
  ctx.save();ctx.setLineDash([3,5]);ctx.strokeStyle=col;ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(10,hdr+8);ctx.lineTo(10,sh-ftr-8);ctx.stroke();
  ctx.beginPath();ctx.moveTo(sw-10,hdr+8);ctx.lineTo(sw-10,sh-ftr-8);ctx.stroke();
  ctx.setLineDash([]);ctx.restore();
}
function wrapText(ctx,text,maxW){
  const words=text.split(' ');let line='',lines=[];
  for(const w of words){const t=line+(line?' ':'')+w;if(ctx.measureText(t).width>maxW&&line){lines.push(line);line=w;}else line=t;}
  lines.push(line);return lines;
}
function fmtDate(){
  const d=new Date();
  return d.getFullYear()+'.'+String(d.getMonth()+1).padStart(2,'0')+'.'+String(d.getDate()).padStart(2,'0');
}

/* ═══ DOWNLOAD ═══ */
function downloadStrip(){
  const cv=document.getElementById('stripCanvas');
  const a=document.createElement('a');
  const safe=(userName||'booth').replace(/[^a-z0-9가-힣]/gi,'_');
  a.download='포토부스_'+safe+'_'+selTheme+'_'+Date.now()+'.png';
  a.href=cv.toDataURL('image/png');a.click();
}

/* ═══ RESTART ═══ */
function restartBooth(){
  photosTaken=0;capturedImages.length=0;isCounting=false;
  document.getElementById('thumbnails').innerHTML='';
  ['ch1','ch2','ch3'].forEach(id=>document.getElementById(id).classList.remove('taken'));
  const btn=document.getElementById('captureBtn');btn.disabled=false;
  btn.innerHTML='Take Photo <span id="pNum">1</span> of 3';
  go('stripSection','welcomeScreen');dots(1);
}

document.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&!document.getElementById('welcomeScreen').classList.contains('hidden'))startBooth();
});
