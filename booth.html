<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>포토부스 · Korean Photo Booth</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,600&family=Nanum+Pen+Script&display=swap');

:root {
  --rose:      #f9a8c9;
  --rose-deep: #e8698a;
  --lilac:     #c4b0f0;
  --sky:       #a8d4f5;
  --peach:     #fcd5b5;
  --mint:      #a8e6cf;
  --cream:     #fffaf5;
  --text:      #3d2c4a;
  --text-mid:  #7a6490;
  --text-light:#b0a0c0;
  --glass:     rgba(255,255,255,0.75);
  --glow:      rgba(232,105,138,0.18);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: #fdf0f6;
  min-height: 100vh;
  color: var(--text);
  overflow-x: hidden;
}

/* Soft noise background */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 80% 60% at 15% 20%, rgba(249,168,201,0.25) 0%, transparent 60%),
    radial-gradient(ellipse 60% 80% at 85% 80%, rgba(196,176,240,0.22) 0%, transparent 60%),
    radial-gradient(ellipse 70% 50% at 50% 50%, rgba(168,212,245,0.15) 0%, transparent 70%);
  pointer-events: none;
}

#app {
  position: relative; z-index: 1;
  display: flex; flex-direction: column; align-items: center;
  min-height: 100vh;
  padding: 28px 16px 60px;
}

/* ── Header ── */
.app-header {
  text-align: center;
  margin-bottom: 24px;
}
.header-badge {
  display: inline-flex; align-items: center; gap: 8px;
  background: rgba(255,255,255,0.9);
  border: 1.5px solid rgba(232,105,138,0.2);
  border-radius: 100px;
  padding: 6px 18px;
  font-size: 11px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--rose-deep);
  font-weight: 600;
  margin-bottom: 10px;
}
.header-badge .dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--rose-deep);
  animation: breathe 2s ease-in-out infinite;
}
@keyframes breathe { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.7)} }

.logo {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: clamp(28px, 5.5vw, 42px);
  color: var(--text);
  letter-spacing: -0.5px;
  line-height: 1;
}
.logo span {
  background: linear-gradient(135deg, var(--rose-deep) 0%, var(--lilac) 50%, var(--sky) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}

/* ── Step Dots ── */
.step-indicator {
  display: flex; align-items: center; gap: 0;
  margin-bottom: 22px;
}
.step-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: rgba(196,176,240,0.35);
  transition: all 0.4s cubic-bezier(0.34,1.56,0.64,1);
}
.step-line {
  width: 28px; height: 1.5px;
  background: rgba(196,176,240,0.3);
  transition: background 0.4s;
}
.step-dot.active {
  background: var(--rose-deep);
  transform: scale(1.5);
  box-shadow: 0 0 0 4px rgba(232,105,138,0.2);
}
.step-dot.done { background: var(--lilac); transform: scale(1.1); }
.step-line.done { background: var(--lilac); }

/* ── Card ── */
.card {
  background: rgba(255,255,255,0.88);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-radius: 24px;
  padding: 32px 28px;
  box-shadow:
    0 2px 0 rgba(255,255,255,0.95) inset,
    0 12px 48px rgba(180,120,200,0.12),
    0 2px 8px rgba(180,120,200,0.08);
  width: 100%; max-width: 460px;
  border: 1px solid rgba(255,255,255,0.9);
  transition: box-shadow 0.3s;
}
.card:hover { box-shadow: 0 2px 0 rgba(255,255,255,0.95) inset, 0 18px 60px rgba(180,120,200,0.16), 0 2px 8px rgba(180,120,200,0.1); }

/* ── Typography ── */
.section-title {
  font-family: 'Playfair Display', serif;
  font-size: 26px;
  color: var(--text);
  text-align: center;
  margin-bottom: 6px;
  letter-spacing: -0.3px;
}
.section-sub {
  font-size: 13px;
  color: var(--text-light);
  text-align: center;
  margin-bottom: 26px;
  line-height: 1.6;
  font-weight: 400;
}

/* ── Welcome decorative art ── */
.welcome-art {
  width: 90px; height: 90px;
  margin: 0 auto 18px;
  position: relative;
}
.welcome-art .ring {
  position: absolute; border-radius: 50%;
  border: 2px solid;
}
.welcome-art .ring-1 {
  inset: 0; border-color: rgba(249,168,201,0.4);
  animation: spin 8s linear infinite;
}
.welcome-art .ring-2 {
  inset: 10px; border-color: rgba(196,176,240,0.5);
  animation: spin 5s linear infinite reverse;
}
.welcome-art .inner {
  position: absolute; inset: 22px;
  background: linear-gradient(135deg, var(--rose), var(--lilac));
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
  box-shadow: 0 4px 16px rgba(232,105,138,0.3);
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Inputs ── */
.input-group { margin-bottom: 14px; }
.input-group label {
  display: flex; align-items: center; gap: 6px;
  font-size: 11px; font-weight: 600;
  color: var(--text-mid);
  letter-spacing: 1.5px; text-transform: uppercase;
  margin-bottom: 8px;
}
.input-group label .label-icon {
  width: 18px; height: 18px; border-radius: 6px;
  background: linear-gradient(135deg, var(--rose), var(--lilac));
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 9px;
}
.input-group input, .input-group textarea {
  width: 100%; padding: 13px 16px;
  border: 1.5px solid rgba(196,176,240,0.35);
  border-radius: 14px;
  font-family: 'DM Sans', sans-serif;
  font-size: 15px; color: var(--text);
  background: rgba(255,255,255,0.8);
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
  resize: none;
}
.input-group input:focus, .input-group textarea:focus {
  border-color: var(--rose-deep);
  box-shadow: 0 0 0 4px rgba(232,105,138,0.1);
  background: #fff;
}
.input-group input::placeholder, .input-group textarea::placeholder { color: #d8c8e8; }

/* ── Buttons ── */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  padding: 14px 24px;
  border: none; border-radius: 100px; cursor: pointer;
  font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600;
  letter-spacing: 0.2px;
  transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.2s;
  width: 100%; margin-top: 10px;
}
.btn:hover { transform: translateY(-2px) scale(1.01); }
.btn:active { transform: scale(0.97); }
.btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none !important; }

.btn-primary {
  background: linear-gradient(135deg, var(--rose-deep) 0%, #c45a85 50%, var(--lilac) 100%);
  background-size: 200% 100%; background-position: 0% 50%;
  color: #fff;
  box-shadow: 0 4px 20px rgba(232,105,138,0.35);
  transition: transform 0.2s, box-shadow 0.2s, background-position 0.4s;
}
.btn-primary:hover { background-position: 100% 50%; box-shadow: 0 8px 28px rgba(232,105,138,0.45); }

.btn-download {
  background: linear-gradient(135deg, #85d9b5 0%, #5ec4a0 100%);
  color: #1a5c48;
  box-shadow: 0 4px 20px rgba(94,196,160,0.3);
}
.btn-download:hover { box-shadow: 0 8px 28px rgba(94,196,160,0.4); }

.btn-ghost {
  background: rgba(196,176,240,0.12);
  color: var(--text-mid);
  border: 1.5px solid rgba(196,176,240,0.3);
  box-shadow: none;
  font-size: 13px; margin-top: 8px;
}
.btn-ghost:hover { background: rgba(196,176,240,0.2); transform: none; }

/* ── Camera Screen ── */
.cam-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px;
}
.cam-title { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--text); }
.cam-counter-chips {
  display: flex; gap: 6px;
}
.chip {
  width: 28px; height: 28px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700;
  background: rgba(196,176,240,0.2);
  color: var(--text-light);
  border: 1.5px solid rgba(196,176,240,0.3);
  transition: all 0.4s cubic-bezier(0.34,1.56,0.64,1);
}
.chip.taken {
  background: linear-gradient(135deg, var(--rose-deep), var(--lilac));
  color: #fff; border-color: transparent;
  box-shadow: 0 2px 10px rgba(232,105,138,0.35);
  transform: scale(1.15);
}

/* Camera wrapper — 3:4 portrait ratio (phone ratio) */
.camera-wrap {
  position: relative; width: 100%;
  aspect-ratio: 3 / 4;
  border-radius: 18px; overflow: hidden;
  background: #1a0d24;
  box-shadow: 0 8px 32px rgba(100,50,120,0.22);
  margin-bottom: 14px;
}
#video {
  width: 100%; height: 100%;
  object-fit: cover; display: block;
  transform: scaleX(-1);
}

/* Camera overlay – subtle vignette */
.camera-wrap::after {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at center, transparent 60%, rgba(20,10,30,0.3) 100%);
  pointer-events: none;
  border-radius: 18px;
}

.flash-overlay {
  position: absolute; inset: 0;
  background: #fff; opacity: 0; pointer-events: none;
}
.flash-overlay.flash { animation: flashAnim 0.5s ease-out forwards; }
@keyframes flashAnim { 0%{opacity:1} 100%{opacity:0} }

.countdown-display {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  pointer-events: none; z-index: 5;
}
.countdown-number {
  font-family: 'Playfair Display', serif;
  font-size: 120px; font-weight: 700;
  color: rgba(255,255,255,0.95);
  text-shadow: 0 0 60px rgba(255,180,220,0.8), 0 4px 24px rgba(0,0,0,0.25);
  opacity: 0; transform: scale(0.6);
}
.countdown-number.show { animation: countPop 0.9s ease forwards; }
@keyframes countPop {
  0%  { opacity: 1; transform: scale(0.6); }
  40% { transform: scale(1.15); }
  70% { transform: scale(0.95); opacity: 1; }
  100%{ transform: scale(1);   opacity: 0; }
}

/* Thumbnails */
.thumbnails {
  display: flex; gap: 8px; justify-content: center;
  margin-top: 4px; margin-bottom: 4px;
}
.thumb {
  border-radius: 10px;
  object-fit: cover;
  border: 2px solid rgba(249,168,201,0.6);
  box-shadow: 0 3px 12px rgba(180,100,140,0.2);
  animation: thumbPop 0.4s cubic-bezier(0.34,1.56,0.64,1) forwards;
  transform: scale(0);
  /* 3:4 ratio thumbnails */
  width: 60px;
  height: 80px;
}
@keyframes thumbPop { to { transform: scale(1); } }

/* ── Strip Result ── */
.strip-wrap {
  display: flex; justify-content: center;
  margin: 14px 0 16px;
}
#stripCanvas {
  border-radius: 14px;
  box-shadow: 0 12px 60px rgba(150,80,160,0.22), 0 2px 0 rgba(255,255,255,0.8) inset;
  max-width: 100%; max-height: 70vh;
  animation: stripReveal 0.7s cubic-bezier(0.22,1,0.36,1) forwards;
  transform: scale(0.85) translateY(16px); opacity: 0;
}
@keyframes stripReveal { to { transform: scale(1) translateY(0); opacity: 1; } }

/* ── Screen transitions ── */
.step-screen { animation: slideIn 0.45s cubic-bezier(0.22,1,0.36,1) forwards; opacity: 0; transform: translateY(20px); }
@keyframes slideIn { to { opacity: 1; transform: translateY(0); } }
.hidden { display: none !important; }
</style>
</head>
<body>

<div id="app">

  <!-- Header -->
  <header class="app-header">
    <div class="header-badge"><span class="dot"></span>Photo Booth</div>
    <div class="logo"><span>포토부스</span></div>
  </header>

  <!-- Step Indicator -->
  <div class="step-indicator">
    <div class="step-dot active" id="dot1"></div>
    <div class="step-line" id="line1"></div>
    <div class="step-dot" id="dot2"></div>
    <div class="step-line" id="line2"></div>
    <div class="step-dot" id="dot3"></div>
  </div>

  <!-- SCREEN 1: Welcome -->
  <div class="card step-screen" id="welcomeScreen">
    <div class="welcome-art">
      <div class="ring ring-1"></div>
      <div class="ring ring-2"></div>
      <div class="inner">📷</div>
    </div>
    <h1 class="section-title">어서오세요!</h1>
    <p class="section-sub">Welcome to your personal photo strip.<br>Three photos, one beautiful memory.</p>

    <div class="input-group">
      <label><span class="label-icon">✦</span> Your Name</label>
      <input type="text" id="userName" placeholder="e.g. Soyeon · 소연" maxlength="30" />
    </div>
    <div class="input-group">
      <label><span class="label-icon">♡</span> Your Message</label>
      <textarea id="userMessage" rows="2" placeholder="e.g. 오늘도 행복하게" maxlength="60"></textarea>
    </div>
    <button class="btn btn-primary" onclick="startBooth()">Start Photo Booth →</button>
  </div>

  <!-- SCREEN 2: Camera -->
  <div class="card step-screen hidden" id="cameraScreen">
    <div class="cam-header">
      <div class="cam-title">Say 치즈!</div>
      <div class="cam-counter-chips">
        <div class="chip" id="ch1">1</div>
        <div class="chip" id="ch2">2</div>
        <div class="chip" id="ch3">3</div>
      </div>
    </div>

    <div class="camera-wrap">
      <video id="video" autoplay playsinline muted></video>
      <div class="flash-overlay" id="flashOverlay"></div>
      <div class="countdown-display">
        <div class="countdown-number" id="countdownNum"></div>
      </div>
    </div>

    <div class="thumbnails" id="thumbnails"></div>

    <button class="btn btn-primary" id="captureBtn" onclick="startCountdown()">
      Take Photo <span id="photoNum">1</span> of 3
    </button>
  </div>

  <!-- SCREEN 3: Strip -->
  <div class="card step-screen hidden" id="stripSection">
    <h2 class="section-title">Your Strip!</h2>
    <p class="section-sub">Your Korean-style photo strip is ready.<br>Download and keep it forever.</p>
    <div class="strip-wrap">
      <canvas id="stripCanvas"></canvas>
    </div>
    <button class="btn btn-download" onclick="downloadStrip()">Download Strip</button>
    <button class="btn btn-ghost" onclick="restartBooth()">Take New Photos</button>
  </div>

</div>

<!-- Hidden capture canvas -->
<canvas id="captureCanvas" class="hidden"></canvas>

<script>
let userName = '', userMessage = '';
let photosTaken = 0;
const MAX_PHOTOS = 3;
const capturedImages = [];
let stream = null;
let isCounting = false;

const video = document.getElementById('video');
const flashOverlay = document.getElementById('flashOverlay');
const countdownNum = document.getElementById('countdownNum');
const thumbnails = document.getElementById('thumbnails');
const captureBtn = document.getElementById('captureBtn');
const photoNumSpan = document.getElementById('photoNum');

// ── Start ──
function startBooth() {
  const name = document.getElementById('userName').value.trim();
  if (!name) {
    const el = document.getElementById('userName');
    el.style.borderColor = '#e8698a';
    el.focus();
    setTimeout(() => el.style.borderColor = '', 1200);
    return;
  }
  userName = name;
  userMessage = document.getElementById('userMessage').value.trim() || '오늘도 행복하게';
  switchScreen('welcomeScreen', 'cameraScreen');
  setStepDots(2);
  initCamera();
}

// ── Camera ──
async function initCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: { ideal: 1080 }, height: { ideal: 1440 } },
      audio: false
    });
    video.srcObject = stream;
  } catch (err) {
    alert('Camera access needed.\n\n' + err.message);
  }
}

function startCountdown() {
  if (isCounting || photosTaken >= MAX_PHOTOS) return;
  isCounting = true;
  captureBtn.disabled = true;
  let count = 3;
  showCountNum(count);
  const iv = setInterval(() => {
    count--;
    if (count > 0) showCountNum(count);
    else { clearInterval(iv); capturePhoto(); }
  }, 1000);
}

function showCountNum(n) {
  countdownNum.textContent = n;
  countdownNum.classList.remove('show');
  void countdownNum.offsetWidth;
  countdownNum.classList.add('show');
}

function capturePhoto() {
  flashOverlay.classList.remove('flash');
  void flashOverlay.offsetWidth;
  flashOverlay.classList.add('flash');

  const canvas = document.getElementById('captureCanvas');
  // Use 3:4 portrait ratio
  const srcW = video.videoWidth || 720;
  const srcH = video.videoHeight || 960;

  // Crop to portrait 3:4 from center
  let cropW = srcW, cropH = Math.round(srcW * 4 / 3);
  if (cropH > srcH) { cropH = srcH; cropW = Math.round(srcH * 3 / 4); }
  const cropX = (srcW - cropW) / 2;
  const cropY = (srcH - cropH) / 2;

  canvas.width = cropW;
  canvas.height = cropH;
  const ctx = canvas.getContext('2d');
  ctx.translate(canvas.width, 0);
  ctx.scale(-1, 1);
  ctx.drawImage(video, cropX, cropY, cropW, cropH, 0, 0, cropW, cropH);

  const dataURL = canvas.toDataURL('image/jpeg', 0.95);
  capturedImages.push(dataURL);
  photosTaken++;

  document.getElementById('ch' + photosTaken).classList.add('taken');

  const img = document.createElement('img');
  img.src = dataURL;
  img.className = 'thumb';
  thumbnails.appendChild(img);

  isCounting = false;

  if (photosTaken >= MAX_PHOTOS) {
    captureBtn.textContent = 'Generating your strip…';
    setTimeout(() => { stopCamera(); generateStrip(); }, 700);
  } else {
    captureBtn.disabled = false;
    photoNumSpan.textContent = photosTaken + 1;
    captureBtn.innerHTML = 'Take Photo <span id="photoNum">' + (photosTaken + 1) + '</span> of 3';
  }
}

function stopCamera() {
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
}

// ── Generate Strip ──
function generateStrip() {
  switchScreen('cameraScreen', 'stripSection');
  setStepDots(3);

  const canvas = document.getElementById('stripCanvas');
  const ctx = canvas.getContext('2d');

  const DPR = 2;
  const stripW = 300;
  const photoW = 240;
  const photoH = Math.round(photoW * 4 / 3); // 320px — strict 3:4
  const padX = (stripW - photoW) / 2;         // 30
  const padTop = 32;
  const gap = 12;
  const headerH = 44;
  const footerH = 110;
  const stripH = headerH + padTop + (photoH * 3) + (gap * 2) + footerH;

  canvas.width = stripW * DPR;
  canvas.height = stripH * DPR;
  canvas.style.width = stripW + 'px';
  canvas.style.height = stripH + 'px';
  ctx.scale(DPR, DPR);

  // ── Background ──
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, stripW, stripH);

  // Soft background gradient
  const bgG = ctx.createLinearGradient(0, 0, stripW, stripH);
  bgG.addColorStop(0, '#fff9fc'); bgG.addColorStop(1, '#fdf4ff');
  ctx.fillStyle = bgG; ctx.fillRect(0, 0, stripW, stripH);

  // ── Header band ──
  ctx.save();
  roundRect(ctx, 0, 0, stripW, headerH, 0);
  const hG = ctx.createLinearGradient(0, 0, stripW, 0);
  hG.addColorStop(0, '#f9a8c9'); hG.addColorStop(0.5, '#c4b0f0'); hG.addColorStop(1, '#a8d4f5');
  ctx.fillStyle = hG; ctx.fill(); ctx.restore();

  // Header text
  ctx.textAlign = 'center';
  ctx.font = 'bold 13px "DM Sans", sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.95)';
  ctx.fillText('포토부스  ·  photo booth', stripW / 2, headerH / 2 + 5);

  // ── Corner decorations (subtle) ──
  drawCornerDots(ctx, stripW, stripH, headerH, footerH);

  // ── Draw photos ──
  const imgPromises = capturedImages.map(src => new Promise(res => {
    const img = new Image(); img.onload = () => res(img); img.src = src;
  }));

  Promise.all(imgPromises).then(images => {
    images.forEach((img, i) => {
      const y = headerH + padTop + i * (photoH + gap);

      // Shadow
      ctx.save();
      ctx.shadowColor = 'rgba(180,100,180,0.15)';
      ctx.shadowBlur = 14; ctx.shadowOffsetY = 5;
      ctx.fillStyle = '#fff';
      roundRect(ctx, padX - 1, y - 1, photoW + 2, photoH + 2, 8);
      ctx.fill();
      ctx.restore();

      // Photo clip
      ctx.save();
      roundRect(ctx, padX, y, photoW, photoH, 7);
      ctx.clip();
      ctx.drawImage(img, padX, y, photoW, photoH);
      ctx.restore();

      // Subtle inner border
      ctx.save();
      roundRect(ctx, padX, y, photoW, photoH, 7);
      ctx.strokeStyle = 'rgba(200,170,220,0.4)'; ctx.lineWidth = 1.5;
      ctx.stroke(); ctx.restore();

      // Small photo number label
      ctx.save();
      ctx.fillStyle = 'rgba(255,255,255,0.9)';
      roundRect(ctx, padX + 6, y + photoH - 22, 18, 16, 5);
      ctx.fill();
      ctx.font = 'bold 10px "DM Sans", sans-serif';
      ctx.fillStyle = '#b070c0';
      ctx.textAlign = 'center';
      ctx.fillText(i + 1, padX + 6 + 9, y + photoH - 10);
      ctx.restore();
    });

    // ── Decorative divider ──
    const fY = headerH + padTop + 3 * (photoH + gap) - gap + 8;
    drawDivider(ctx, padX, fY, photoW);

    // ── Footer ──
    const footerStart = stripH - footerH;

    // Name
    ctx.textAlign = 'center';
    ctx.font = 'italic 600 22px "Playfair Display", serif';
    ctx.fillStyle = '#7a5a9a';
    ctx.fillText(userName, stripW / 2, footerStart + 28);

    // Heart row
    ctx.font = '12px serif';
    ctx.fillStyle = 'rgba(196,176,240,0.8)';
    ctx.fillText('· · · ♡ · · ·', stripW / 2, footerStart + 48);

    // Message
    ctx.font = '400 12px "DM Sans", sans-serif';
    ctx.fillStyle = '#b090c8';
    const words = userMessage.split(' ');
    let line = '', lines = [];
    for (const w of words) {
      const test = line + (line ? ' ' : '') + w;
      if (ctx.measureText(test).width > photoW - 8 && line) { lines.push(line); line = w; }
      else line = test;
    }
    lines.push(line);
    lines.slice(0, 2).forEach((l, i) => ctx.fillText(l, stripW / 2, footerStart + 66 + i * 16));

    // Date
    const today = new Date();
    const dateStr = today.getFullYear() + '.' + String(today.getMonth()+1).padStart(2,'0') + '.' + String(today.getDate()).padStart(2,'0');
    ctx.font = '400 10px "DM Sans", sans-serif';
    ctx.fillStyle = 'rgba(180,160,200,0.65)';
    ctx.fillText(dateStr, stripW / 2, footerStart + 90);

    // ── Bottom band ──
    ctx.save();
    const bG = ctx.createLinearGradient(0, 0, stripW, 0);
    bG.addColorStop(0, '#a8d4f5'); bG.addColorStop(0.5, '#c4b0f0'); bG.addColorStop(1, '#f9a8c9');
    ctx.fillStyle = bG;
    ctx.beginPath();
    ctx.moveTo(0, stripH - 16);
    ctx.lineTo(stripW, stripH - 16);
    ctx.lineTo(stripW, stripH);
    ctx.lineTo(0, stripH);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  });
}

function drawCornerDots(ctx, sw, sh, hH, fH) {
  const positions = [
    [16, hH + 14], [sw - 16, hH + 14],
    [16, sh - fH - 14], [sw - 16, sh - fH - 14]
  ];
  positions.forEach(([x, y]) => {
    ctx.beginPath();
    ctx.arc(x, y, 2.5, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(196,176,240,0.45)';
    ctx.fill();
  });
}

function drawDivider(ctx, x, y, w) {
  const g = ctx.createLinearGradient(x, 0, x + w, 0);
  g.addColorStop(0, 'rgba(196,176,240,0)');
  g.addColorStop(0.5, 'rgba(196,176,240,0.5)');
  g.addColorStop(1, 'rgba(196,176,240,0)');
  ctx.strokeStyle = g; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x + w, y); ctx.stroke();
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y); ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r); ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h); ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r); ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// ── Download ──
function downloadStrip() {
  const canvas = document.getElementById('stripCanvas');
  const link = document.createElement('a');
  const safe = (userName || 'photobooth').replace(/[^a-z0-9가-힣]/gi, '_');
  link.download = '포토부스_' + safe + '_' + Date.now() + '.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}

// ── Restart ──
function restartBooth() {
  photosTaken = 0; capturedImages.length = 0; isCounting = false;
  thumbnails.innerHTML = '';
  ['ch1','ch2','ch3'].forEach(id => document.getElementById(id).classList.remove('taken'));
  captureBtn.disabled = false;
  captureBtn.innerHTML = 'Take Photo <span id="photoNum">1</span> of 3';
  switchScreen('stripSection', 'welcomeScreen');
  setStepDots(1);
}

// ── Helpers ──
function switchScreen(fromId, toId) {
  document.getElementById(fromId).classList.add('hidden');
  const to = document.getElementById(toId);
  to.classList.remove('hidden', 'step-screen');
  void to.offsetWidth;
  to.classList.add('step-screen');
}

function setStepDots(active) {
  [1,2,3].forEach(i => {
    const dot = document.getElementById('dot' + i);
    dot.classList.remove('active','done');
    if (i < active) { dot.classList.add('done'); }
    if (i === active) dot.classList.add('active');
  });
  [1,2].forEach(i => {
    const line = document.getElementById('line' + i);
    line.classList.toggle('done', i < active);
  });
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !document.getElementById('welcomeScreen').classList.contains('hidden')) startBooth();
});
</script>
