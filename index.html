<html>
<head>

<!-- Modal for product purchase form -->
<div id="purchaseModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000;">
    <div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:white; padding:20px; width:400px;">
        <span onclick="closeModal()" style="float:right; cursor:pointer;">&times;</span>
        <h3 id="modalProductTitle">Complete Purchase Details</h3>

        <input type="hidden" id="selectedProductPdf">
        <input type="hidden" id="selectedProductPrice">
        
        <label>Name *</label>
        <input type="text" id="buyer_name" placeholder="Full Name"><br><br>
        
        <label>Email *</label>
        <input type="email" id="buyer_email" placeholder="Email"><br><br>

<div id="pdfViewer" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:2000;">

        <button onclick="closePDFViewer()" style="position:absolute; top:-40px; right:0; background:none; border:none; color:white; font-size:30px; cursor:pointer;">&times;</button>

    </div>
</div>

<script>
// Initialize EmailJS
emailjs.init("7rgj4t_06JrmsxgHC");

const supabaseClient = window.supabase.createClient(
    "https://eyekpbzcdouhkquqjjae.supabase.co",
    "sb_publishable_hONe7ntkTZaGeyFsLV0iMQ_9aTXtOBE"
);

const RAZORPAY_KEY = "rzp_live_SV68ifsBjM5tPz";
let currentProduct = null;
let pendingFormData = null;

// In-memory cache of loaded itineraries (populated during loadItineraries)
let allItineraries = [];

// ─── Contact form ───────────────────────────────────────────────────────────
async function submitContact() {
    const name    = document.getElementById("name").value;
    const email   = document.getElementById("email").value;
    const contact = document.getElementById("contact").value;
    const message = document.getElementById("message").value;

    if (!name || !email || !contact) { alert("Please fill all required fields"); return; }

    const { error } = await supabaseClient
        .from('contact_messages')
        .insert([{ name, email, contact, message }]);

    if (error) { alert("Error: " + error.message); return; }

    alert("Contact form submitted successfully!");
    ["name","email","contact","message"].forEach(id => document.getElementById(id).value = "");
}

// ─── Reviews ────────────────────────────────────────────────────────────────
async function loadReviews() {
    try {
        const { data, error } = await supabaseClient
            .from('reviews')
            .select('*')
            .order('created_at', { ascending: false });

        if (error) { document.getElementById("reviews").innerHTML = "Error loading reviews"; return; }

        const reviewsDiv = document.getElementById("reviews");

        if (!data || data.length === 0) {
            reviewsDiv.innerHTML = "No reviews yet";
            document.getElementById("averageRating").innerHTML = "0.0";
            document.getElementById("starDisplay").innerHTML = "☆☆☆☆☆";
            document.getElementById("totalReviews").innerHTML = "0 reviews";
            return;
        }

        const avg = (data.reduce((s, r) => s + r.rating, 0) / data.length).toFixed(1);
        const full  = Math.floor(avg);
        const half  = (avg % 1) >= 0.5 ? 1 : 0;
        const empty = 5 - full - half;

        document.getElementById("averageRating").innerHTML = avg;
        document.getElementById("starDisplay").innerHTML   = "★".repeat(full) + (half ? "½" : "") + "☆".repeat(empty);
        document.getElementById("totalReviews").innerHTML  = `${data.length} review${data.length !== 1 ? 's' : ''}`;

        reviewsDiv.innerHTML = data.map(r => `
            <div style="border:1px solid #ccc; margin:10px 0; padding:10px;">
                <strong>${escapeHtml(r.name)}</strong> visited <strong>${escapeHtml(r.travel_place)}</strong><br>
                Rating: ${"★".repeat(r.rating)}${"☆".repeat(5 - r.rating)} (${r.rating}/5)<br>
                Message: ${escapeHtml(r.message) || "No message"}<br>
                <small>${new Date(r.created_at).toLocaleString()}</small>
            </div>
        `).join("");
    } catch (err) { console.error("Error in loadReviews:", err); }
}

// ─── Products ────────────────────────────────────────────────────────────────
async function loadProducts() {
    try {
        const { data, error } = await supabaseClient
            .from('products')
            .select('*')
            .order('created_at', { ascending: false });

        if (error) { document.getElementById("productsList").innerHTML = "Error loading products"; return; }

        const productsDiv = document.getElementById("productsList");
        if (!data || data.length === 0) { productsDiv.innerHTML = "No products found"; return; }

        productsDiv.innerHTML = data.map(p => `
            <div style="border:1px solid #ccc; margin:10px 0; padding:10px; display:inline-block; width:300px; vertical-align:top;">
                <h3>${escapeHtml(p.title)}</h3>
                <p>Price: ₹${parseFloat(p.price).toFixed(2)}</p>
                <p>Description: ${escapeHtml(p.description) || "No description"}</p>
                ${p.image_url ? `<img src="${p.image_url}" style="max-width:100%; height:150px;"><br>` : ''}
                 <small>Added: ${new Date(p.created_at).toLocaleString()}</small><br><br>
                <button onclick="openProductPurchaseModal(${p.id}, '${escapeHtml(p.title)}', ${p.price}, '${p.pdf_url || ''}')">Buy Now - Pay ₹${p.price}</button>
            </div>
        `).join("");
    } catch (err) { console.error("Error in loadProducts:", err); }
}

// ─── Itinerary Library ───────────────────────────────────────────────────────
async function loadItineraries() {
    try {
        const { data, error } = await supabaseClient
            .from('itineraries')
            .select('*')
            .order('category', { ascending: true });

        if (error) { document.getElementById("itineraryLibrary").innerHTML = "Error loading itineraries"; return; }

        const container = document.getElementById("itineraryLibrary");

        if (!data || data.length === 0) {
            container.innerHTML = "No itineraries available yet. Check back soon!";
            return;
        }

        // Cache for use during payment
        allItineraries = data;

        // Group by category
        const grouped = {};
        for (const item of data) {
            if (!grouped[item.category]) grouped[item.category] = [];
            grouped[item.category].push(item);
        }

        let html = "";
        for (const category in grouped) {
            html += `<h3>📌 ${category}</h3><div>`;
            for (const itinerary of grouped[category]) {
                const safePdfUrl  = (itinerary.pdf_url  || '').replace(/'/g, "\\'");
                const safeTitle   = escapeHtml(itinerary.title);
                html += `
                    <div style="border:1px solid #ccc; margin:10px; padding:10px; display:inline-block; width:300px; vertical-align:top;">
                        ${itinerary.thumbnail_url ? `<img src="${itinerary.thumbnail_url}" style="max-width:100%; height:150px;"><br>` : ''}
                        <h4>${safeTitle}</h4>
                        <p><strong>Duration:</strong> ${itinerary.duration || 'N/A'}</p>
                        <p><strong>Difficulty:</strong> ${itinerary.difficulty || 'N/A'}</p>
                        <p>${escapeHtml(itinerary.description) || ''}</p>
                        ${itinerary.pdf_url ? `
                            <button onclick="viewPDF('${safePdfUrl}')">👁️ View PDF</button>
                            <button onclick="downloadPDF('${safePdfUrl}', '${safeTitle}')">📥 Download PDF</button>
                            <br><br>
                            <button onclick="selectItineraryForRequest('${safePdfUrl}', '${safeTitle}')">📋 Request This Itinerary</button>
                        ` : ''}
                    </div>
                `;
            }
            html += `</div>`;
        }
        container.innerHTML = html;
    } catch (err) { console.error("Error in loadItineraries:", err); }
}

/**
 * Called when user clicks "Request This Itinerary" on a library card.
 * Stores the PDF URL so it gets downloaded after payment.
 */
function selectItineraryForRequest(pdfUrl, title) {
    document.getElementById("selected_itinerary_pdf_url").value = pdfUrl;

    // Scroll to the request form and auto-fill destination hint
    document.getElementById("full_name").scrollIntoView({ behavior: 'smooth' });
    alert(`✅ "${title}" selected! Please fill in the form below and pay ₹1 to receive this itinerary.`);
}

// ─── PDF helpers ─────────────────────────────────────────────────────────────
function viewPDF(pdfUrl) {
    document.getElementById("pdfFrame").src = pdfUrl;
    document.getElementById("pdfViewer").style.display = "block";
}

function closePDFViewer() {
    document.getElementById("pdfFrame").src = "";
    document.getElementById("pdfViewer").style.display = "none";
}

/**
 * Download a PDF from a Supabase storage public URL.
 * Uses fetch + blob so the browser saves it as a file instead of navigating.
 */
async function downloadPDF(pdfUrl, title) {
    if (!pdfUrl) { alert("No PDF available."); return; }
    try {
        const response = await fetch(pdfUrl);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const blob = await response.blob();
        const blobUrl = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = blobUrl;
        a.download = `${title.replace(/[^a-z0-9]/gi, '_')}.pdf`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(blobUrl);
    } catch (err) {
        console.error("Download error:", err);
        // Fallback: open in new tab
        window.open(pdfUrl, '_blank');
    }
}

// ─── Product purchase modal ───────────────────────────────────────────────────
function openProductPurchaseModal(id, title, price, pdfUrl) {
    currentProduct = { id, title, price, pdfUrl };

    document.getElementById("modalProductTitle").innerHTML = `Complete Purchase: ${title}`;
    document.getElementById("selectedProductId").value    = id;
    document.getElementById("selectedProductPdf").value   = pdfUrl;
    document.getElementById("selectedProductPrice").value = price;
    document.getElementById("displayPrice").innerHTML     = price;
    ["buyer_name","buyer_email","buyer_phone","buyer_message"].forEach(id => document.getElementById(id).value = "");
    document.getElementById("travelers").value = "1";

    document.getElementById("purchaseModal").style.display = "block";
}

function closeModal() { document.getElementById("purchaseModal").style.display = "none"; }

function processProductPaymentFromModal() {
    const buyer_name  = document.getElementById("buyer_name").value;
    const buyer_email = document.getElementById("buyer_email").value;
    const buyer_phone = document.getElementById("buyer_phone").value;
    const travelers   = parseInt(document.getElementById("travelers").value);
    const message     = document.getElementById("buyer_message").value;

    if (!buyer_name || !buyer_email || !buyer_phone || !travelers) {
        alert("Please fill all required fields"); return;
    }

    pendingFormData = { buyer_name, buyer_email, buyer_phone, travelers, message };
    closeModal();

    const options = {
        key: RAZORPAY_KEY,
        amount: Math.round(currentProduct.price * 100),
        currency: "INR",
        name: currentProduct.title,
        description: `Purchase: ${currentProduct.title}`,
        prefill: { name: buyer_name, email: buyer_email, contact: buyer_phone },
        handler: handleProductPaymentSuccess,
        modal: { ondismiss: () => { pendingFormData = null; alert("Payment cancelled"); } }
    };
    new Razorpay(options).open();
}

async function handleProductPaymentSuccess(response) {
    const paymentId     = response.razorpay_payment_id;
    const paymentAmount = currentProduct.price;

    if (!pendingFormData) { alert("Error: No form data found"); return; }

    const { error } = await supabaseClient.from('product_orders').insert([{
        product_id:     currentProduct.id,
        product_name:   currentProduct.title,
        product_price:  currentProduct.price,
        buyer_name:     pendingFormData.buyer_name,
        buyer_email:    pendingFormData.buyer_email,
        buyer_phone:    pendingFormData.buyer_phone,
        travelers:      pendingFormData.travelers,
        message:        pendingFormData.message,
        payment_status: 'Paid',
        payment_id:     paymentId,
        payment_amount: paymentAmount,
        payment_date:   new Date().toISOString()
    }]);

    if (error) { alert("Error saving order: " + error.message); return; }

    alert(`✅ Payment successful!\nPayment ID: ${paymentId}\nProduct: ${currentProduct.title}\nAmount: ₹${paymentAmount}`);

    if (currentProduct.pdfUrl && currentProduct.pdfUrl !== 'null' && currentProduct.pdfUrl !== '') {
        await downloadPDF(currentProduct.pdfUrl, currentProduct.title);
    }

    await sendPDFViaEmail(
        pendingFormData.buyer_email,
        pendingFormData.buyer_name,
        paymentId,
        paymentAmount,
        currentProduct.title,
        currentProduct.pdfUrl
    );

    pendingFormData = null;
}

// ─── Custom Itinerary request + payment ──────────────────────────────────────
function processItineraryPayment() {
    const full_name    = document.getElementById("full_name").value;
    const email        = document.getElementById("itinerary_email").value;
    const phone        = document.getElementById("phone").value;
    const trip_type    = document.getElementById("trip_type").value;
    const destination  = document.getElementById("destination").value;
    const days         = document.getElementById("days").value;
    const people       = document.getElementById("people").value;
    const budget       = document.getElementById("budget").value;
    const travel_dates = document.getElementById("travel_dates").value;
    const travel_style = document.getElementById("travel_style").value;
    const food_preference  = document.getElementById("food_preference").value;
    const kids_travelling  = document.getElementById("kids_travelling").value;
    const special_requirements = document.getElementById("special_requirements").value;

    // The PDF URL that was pre-selected from the library (may be empty)
    const selectedPdfUrl = document.getElementById("selected_itinerary_pdf_url").value;

    if (!full_name || !email || !phone || !trip_type || !destination || !days || !people) {
        alert("Please fill all required fields"); return;
    }

    pendingFormData = {
        full_name, email, phone, trip_type, destination,
        days: parseInt(days), people: parseInt(people),
        budget: budget ? parseFloat(budget) : null,
        travel_dates, travel_style, food_preference,
        kids_travelling, special_requirements,
        selectedPdfUrl   // carry the chosen PDF URL through payment
    };

    const options = {
        key: RAZORPAY_KEY,
        amount: 100,   // ₹1 in paise
        currency: "INR",
        name: "Custom Itinerary",
        description: "Personalized Travel Itinerary Plan",
        prefill: { name: full_name, email, contact: phone },
        handler: handleItineraryPaymentSuccess,
        modal: { ondismiss: () => { pendingFormData = null; alert("Payment cancelled"); } }
    };
    new Razorpay(options).open();
}

async function handleItineraryPaymentSuccess(response) {
    const paymentId   = response.razorpay_payment_id;
    const paymentAmount = 1;

    if (!pendingFormData) { alert("Error: No form data found"); return; }

    // Save to Supabase (exclude our local selectedPdfUrl field)
    const { selectedPdfUrl, ...dbData } = pendingFormData;

    const { error } = await supabaseClient.from('itinerary_requests').insert([{
        ...dbData,
        payment_status: 'Paid',
        payment_id:     paymentId,
        payment_amount: paymentAmount,
        payment_date:   new Date().toISOString()
    }]);

    if (error) { alert("Error saving itinerary: " + error.message); return; }

    alert(`✅ Payment successful! Itinerary request submitted.\nPayment ID: ${paymentId}`);

    // ── PDF download after payment ──────────────────────────────────────────
    // Priority 1: PDF explicitly chosen from the library card
    if (selectedPdfUrl && selectedPdfUrl !== '') {
        await downloadPDF(selectedPdfUrl, `${pendingFormData.destination}_Itinerary`);
    } else {
        // Priority 2: Find a matching itinerary in the cached list
        const pdfUrl = findMatchingItineraryPdf(pendingFormData.destination, pendingFormData.trip_type);
        if (pdfUrl) {
            await downloadPDF(pdfUrl, `${pendingFormData.destination}_Itinerary`);
        } else {
            // Priority 3: Query Supabase for any match
            const pdfUrlFromDb = await fetchItineraryPdfFromDb(pendingFormData.destination, pendingFormData.trip_type);
            if (pdfUrlFromDb) {
                await downloadPDF(pdfUrlFromDb, `${pendingFormData.destination}_Itinerary`);
            } else {
                // Fallback: text confirmation file
                createAndDownloadItineraryTxt(
                    pendingFormData.full_name,
                    pendingFormData.destination,
                    pendingFormData.days,
                    pendingFormData.people,
                    paymentId
                );
            }
        }
    }

    await sendItineraryViaEmail(
        pendingFormData.email,
        pendingFormData.full_name,
        paymentId,
        pendingFormData.destination,
        pendingFormData.days,
        pendingFormData.people
    );

    clearItineraryForm();
    pendingFormData = null;
}

/**
 * Search in-memory itinerary cache for a PDF whose title or category
 * loosely matches the submitted destination or trip_type.
 */
function findMatchingItineraryPdf(destination, tripType) {
    if (!allItineraries.length) return null;
    const dest = (destination || '').toLowerCase();
    const type = (tripType || '').toLowerCase();

    // Exact / partial match on title or category
    const match = allItineraries.find(it =>
        (it.title    && it.title.toLowerCase().includes(dest)) ||
        (it.category && it.category.toLowerCase().includes(type)) ||
        (it.title    && it.title.toLowerCase().includes(type))
    );
    return match && match.pdf_url ? match.pdf_url : null;
}

/**
 * Fallback: query Supabase itineraries table for a PDF match.
 */
async function fetchItineraryPdfFromDb(destination, tripType) {
    try {
        // Try matching by category (trip_type) first
        let { data } = await supabaseClient
            .from('itineraries')
            .select('pdf_url')
            .ilike('category', `%${tripType}%`)
            .not('pdf_url', 'is', null)
            .limit(1);

        if (data && data.length && data[0].pdf_url) return data[0].pdf_url;

        // Try matching by title containing destination
        ({ data } = await supabaseClient
            .from('itineraries')
            .select('pdf_url')
            .ilike('title', `%${destination}%`)
            .not('pdf_url', 'is', null)
            .limit(1));

        if (data && data.length && data[0].pdf_url) return data[0].pdf_url;

        // Last resort: any itinerary with a PDF
        ({ data } = await supabaseClient
            .from('itineraries')
            .select('pdf_url')
            .not('pdf_url', 'is', null)
            .limit(1));

        return data && data.length ? data[0].pdf_url : null;
    } catch (err) {
        console.error("fetchItineraryPdfFromDb error:", err);
        return null;
    }
}

// ─── Email helpers ────────────────────────────────────────────────────────────

        await emailjs.send("service_8o8nozh", "template_xui60z6", { name, email, message: emailHTML });

}

        <div style="font-family:Arial,sans-serif;">
            <h2>Itinerary Request Confirmed!</h2>

            <p><strong>Destination:</strong> ${escapeHtml(destination)}</p>
            <p><strong>Duration:</strong> ${days} days</p>
            <p><strong>Travelers:</strong> ${people} people</p>
            <p>Our travel experts will contact you within 24 hours with your personalized itinerary.</p>
        </div>`;

        await emailjs.send("service_8o8nozh", "template_xui60z6", { name, email, message: itineraryHTML });

}

// ─── Fallback TXT download (no PDF found) ────────────────────────────────────
function createAndDownloadItineraryTxt(name, destination, days, people, paymentId) {
    const content = `TRAVEL ITINERARY CONFIRMATION\n================================\n\nCustomer Name: ${name}\nDestination: ${destination}\nDuration: ${days} days\nTravelers: ${people}\nPayment ID: ${paymentId}\n\nStatus: CONFIRMED\n\nOur travel experts will contact you within 24 hours.\n\nThank you!`;
    const blob = new Blob([content], { type: 'text/plain' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = `Itinerary_${name.replace(/\s/g, '_')}_${paymentId}.txt`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
    alert("📄 Itinerary confirmation downloaded! (No matching PDF found in library)");
}

// ─── Form reset ───────────────────────────────────────────────────────────────
function clearItineraryForm() {
    ["full_name","itinerary_email","phone","destination","days","people","budget","travel_dates","special_requirements"]
        .forEach(id => document.getElementById(id).value = "");
    document.getElementById("trip_type").value      = "";
    document.getElementById("travel_style").value   = "";
    document.getElementById("food_preference").value = "No Preference";
    document.getElementById("kids_travelling").value = "No children";
    document.getElementById("selected_itinerary_pdf_url").value = "";
}

// ─── Utility ──────────────────────────────────────────────────────────────────
function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// ─── Init ──────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
    loadReviews();
    loadProducts();
    loadItineraries();
});
