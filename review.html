<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Reviews — Wanderlust</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --cream: #faf7f2; --sand: #f0ebe0; --terracotta: #c4622d; --terracotta-dark: #a04e22;
            --forest: #2d4a3e; --forest-light: #3d6b5c; --gold: #c9952a; --gold-light: #e8b84b;
            --charcoal: #1c1c1e; --mid: #5a5a5a; --light: #9a9a9a; --border: #e0d9ce;
            --white: #fff; --success: #2d7a4f;
        }
        body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--charcoal); min-height: 100vh; }
        a { color: inherit; text-decoration: none; }

        header {
            background: var(--forest); color: var(--white);
            padding: 0 5%; height: 60px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .logo { font-family: 'Playfair Display', serif; font-size: 1.3rem; }
        .logo span { color: var(--gold-light); }
        header a { color: rgba(255,255,255,0.7); font-size: 0.85rem; transition: color 0.2s; }
        header a:hover { color: var(--white); }

        .page-wrap { max-width: 960px; margin: 0 auto; padding: 3rem 5%; }

        .page-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.8rem, 3vw, 2.4rem);
            margin-bottom: 0.4rem;
        }
        .page-sub { color: var(--mid); margin-bottom: 2.5rem; font-size: 0.95rem; }

        /* RATING BANNER */
        .rating-banner {
            background: linear-gradient(135deg, var(--forest), var(--forest-light));
            border-radius: 16px; padding: 1.75rem;
            display: flex; align-items: center; gap: 2rem; flex-wrap: wrap;
            margin-bottom: 2.5rem;
        }
        .rating-big { text-align: center; }
        .rating-big .num { font-family: 'Playfair Display', serif; font-size: 3.5rem; font-weight: 700; color: var(--white); line-height: 1; }
        .rating-big .stars { color: var(--gold-light); font-size: 1.1rem; margin: 0.3rem 0; }
        .rating-big .count { color: rgba(255,255,255,0.55); font-size: 0.82rem; }
        .rating-divider { width: 1px; height: 60px; background: rgba(255,255,255,0.15); }
        .rating-bars { flex: 1; min-width: 160px; }
        .bar-row { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 0.35rem; }
        .bar-label { color: rgba(255,255,255,0.6); font-size: 0.78rem; width: 26px; text-align: right; }
        .bar-track { flex: 1; height: 5px; background: rgba(255,255,255,0.12); border-radius: 3px; overflow: hidden; }
        .bar-fill { height: 100%; background: var(--gold-light); border-radius: 3px; }
        .bar-count { color: rgba(255,255,255,0.45); font-size: 0.73rem; width: 20px; }

        /* FORM CARD */
        .form-section { margin-bottom: 3rem; }
        .form-section h2 { font-family: 'Playfair Display', serif; font-size: 1.3rem; margin-bottom: 1.25rem; }
        .form-card {
            background: var(--white); border: 1px solid var(--border);
            border-radius: 16px; padding: 1.75rem;
        }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; font-size: 0.78rem; font-weight: 600; color: var(--charcoal); margin-bottom: 0.35rem; text-transform: uppercase; letter-spacing: 0.04em; }
        input, select, textarea {
            width: 100%; padding: 0.7rem 0.9rem;
            border: 1.5px solid var(--border); border-radius: 8px;
            font-family: 'DM Sans', sans-serif; font-size: 0.9rem;
            color: var(--charcoal); background: var(--cream); outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        input:focus, select:focus, textarea:focus {
            border-color: var(--forest); box-shadow: 0 0 0 3px rgba(45,74,62,0.1);
        }
        textarea { min-height: 90px; resize: vertical; }
        .btn-submit {
            width: 100%; padding: 0.85rem; border-radius: 8px;
            background: var(--terracotta); color: var(--white);
            font-family: 'DM Sans', sans-serif; font-size: 0.95rem; font-weight: 700;
            border: none; cursor: pointer; transition: background 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 0.5rem;
        }
        .btn-submit:hover { background: var(--terracotta-dark); }
        .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }

        /* REVIEWS */
        .reviews-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; flex-wrap: wrap; gap: 0.5rem; }
        .reviews-header h2 { font-family: 'Playfair Display', serif; font-size: 1.3rem; }
        .btn-reload {
            background: var(--sand); border: 1px solid var(--border);
            color: var(--mid); padding: 0.45rem 1rem; border-radius: 50px;
            font-size: 0.82rem; font-weight: 600; cursor: pointer;
            display: flex; align-items: center; gap: 0.4rem;
            transition: background 0.15s;
        }
        .btn-reload:hover { background: var(--border); }
        .reviews-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; }
        .review-card {
            background: var(--white); border: 1px solid var(--border);
            border-radius: 12px; padding: 1.2rem;
            transition: box-shadow 0.2s;
        }
        .review-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.07); }
        .review-top { display: flex; align-items: center; gap: 0.7rem; margin-bottom: 0.7rem; }
        .avatar {
            width: 38px; height: 38px; border-radius: 50%;
            background: linear-gradient(135deg, var(--terracotta), var(--gold));
            display: flex; align-items: center; justify-content: center;
            color: var(--white); font-weight: 700; font-size: 0.85rem; flex-shrink: 0;
        }
        .rev-name { font-size: 0.9rem; font-weight: 600; }
        .rev-place { font-size: 0.78rem; color: var(--mid); }
        .rev-stars { color: var(--gold); font-size: 0.9rem; margin-bottom: 0.5rem; }
        .rev-text { color: var(--mid); font-size: 0.875rem; line-height: 1.6; }
        .rev-date { color: var(--light); font-size: 0.75rem; margin-top: 0.7rem; }

        .loading-dots { display: flex; gap: 0.4rem; justify-content: center; padding: 2rem; }
        .loading-dots span { width: 8px; height: 8px; border-radius: 50%; background: var(--border); animation: bounce 1.2s infinite; }
        .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-6px);background:var(--terracotta)} }

        .toast-container { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 99; display: flex; flex-direction: column; gap: 0.5rem; }
        .toast { min-width: 240px; padding: 0.8rem 1rem; border-radius: 10px; font-size: 0.875rem; display: flex; gap: 0.6rem; animation: fadeIn 0.3s ease; box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
        .toast-success { background: #f0faf4; border: 1px solid #a8d8b9; color: var(--success); }
        .toast-error { background: #fef0f0; border: 1px solid #f5b7b1; color: #c0392b; }
        @keyframes fadeIn { from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)} }

        @media (max-width: 600px) {
            .form-row { grid-template-columns: 1fr; }
            .rating-divider { display: none; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo">Wander<span>lust</span></div>
    <a href="index.html">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" style="vertical-align:middle;margin-right:4px"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
        Back to Home
    </a>
</header>

<div class="page-wrap">
    <h1 class="page-title">Traveler Reviews</h1>
    <p class="page-sub">Genuine experiences from our community of explorers.</p>

    <!-- Rating Banner -->
    <div class="rating-banner" id="ratingBanner" style="display:none">
        <div class="rating-big">
            <div class="num" id="avgNum">0.0</div>
            <div class="stars" id="avgStars"></div>
            <div class="count" id="avgCount">0 reviews</div>
        </div>
        <div class="rating-divider"></div>
        <div class="rating-bars" id="ratingBars"></div>
    </div>

    <!-- Write Review -->
    <div class="form-section">
        <h2>Share Your Experience</h2>
        <div class="form-card">
            <div class="form-row">
                <div class="form-group">
                    <label>Your Name</label>
                    <input type="text" id="rev_name" placeholder="Full name">
                </div>
                <div class="form-group">
                    <label>Place Visited</label>
                    <input type="text" id="rev_place" placeholder="e.g. Goa, Rajasthan">
                </div>
            </div>
            <div class="form-group">
                <label>Rating</label>
                <select id="rev_rating">
                    <option value="">Select your rating</option>
                    <option value="5">5 Stars — Exceptional</option>
                    <option value="4">4 Stars — Very Good</option>
                    <option value="3">3 Stars — Good</option>
                    <option value="2">2 Stars — Fair</option>
                    <option value="1">1 Star — Poor</option>
                </select>
            </div>
            <div class="form-group">
                <label>Your Review</label>
                <textarea id="rev_message" placeholder="Share the highlights of your journey..."></textarea>
            </div>
            <button class="btn-submit" onclick="submitReview(this)">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
                Submit Review
            </button>
        </div>
    </div>

    <!-- All Reviews -->
    <div>
        <div class="reviews-header">
            <h2>All Reviews</h2>
            <button class="btn-reload" onclick="loadReviews()">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
                Refresh
            </button>
        </div>
        <div class="reviews-grid" id="reviewsGrid">
            <div class="loading-dots"><span></span><span></span><span></span></div>
        </div>
    </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
const sb = window.supabase.createClient(
    "https://eyekpbzcdouhkquqjjae.supabase.co",
    "sb_publishable_hONe7ntkTZaGeyFsLV0iMQ_9aTXtOBE"
);

function toast(msg, type = 'success') {
    const c = document.getElementById('toastContainer');
    const t = document.createElement('div');
    t.className = `toast toast-${type}`;
    t.innerHTML = `<span>${type === 'success' ? '✓' : '✕'}</span><span>${msg}</span>`;
    c.appendChild(t);
    setTimeout(() => t.remove(), 3500);
}

function esc(t) {
    if (!t) return '';
    const d = document.createElement('div');
    d.textContent = t;
    return d.innerHTML;
}

async function loadReviews() {
    const grid = document.getElementById('reviewsGrid');
    const banner = document.getElementById('ratingBanner');
    grid.innerHTML = '<div class="loading-dots"><span></span><span></span><span></span></div>';

    const { data, error } = await sb.from('reviews').select('*').order('created_at', { ascending: false });

    if (error || !data || data.length === 0) {
        grid.innerHTML = '<p style="color:var(--light);padding:2rem;grid-column:1/-1;text-align:center">No reviews yet. Be the first to share!</p>';
        return;
    }

    banner.style.display = 'flex';
    const avg = data.reduce((s, r) => s + r.rating, 0) / data.length;
    document.getElementById('avgNum').textContent = avg.toFixed(1);
    document.getElementById('avgCount').textContent = `${data.length} review${data.length !== 1 ? 's' : ''}`;
    document.getElementById('avgStars').textContent = '★'.repeat(Math.round(avg)) + '☆'.repeat(5 - Math.round(avg));

    const counts = [5,4,3,2,1].map(n => ({ n, c: data.filter(r => r.rating === n).length }));
    document.getElementById('ratingBars').innerHTML = counts.map(({ n, c }) => `
        <div class="bar-row">
            <span class="bar-label">${n}</span>
            <div class="bar-track"><div class="bar-fill" style="width:${data.length ? (c/data.length*100) : 0}%"></div></div>
            <span class="bar-count">${c}</span>
        </div>`).join('');

    grid.innerHTML = data.map(r => `
        <div class="review-card">
            <div class="review-top">
                <div class="avatar">${(r.name||'?')[0].toUpperCase()}</div>
                <div>
                    <div class="rev-name">${esc(r.name)}</div>
                    <div class="rev-place">Visited ${esc(r.travel_place)}</div>
                </div>
            </div>
            <div class="rev-stars">${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)}</div>
            <div class="rev-text">${esc(r.message) || 'No written review.'}</div>
            <div class="rev-date">${new Date(r.created_at).toLocaleDateString('en-IN',{year:'numeric',month:'long',day:'numeric'})}</div>
        </div>`).join('');
}

async function submitReview(btn) {
    const name = document.getElementById('rev_name').value.trim();
    const place = document.getElementById('rev_place').value.trim();
    const rating = parseInt(document.getElementById('rev_rating').value);
    const message = document.getElementById('rev_message').value.trim();

    if (!name || !place || !rating) { toast('Please fill all required fields.', 'error'); return; }

    btn.disabled = true; btn.textContent = 'Submitting...';
    const { error } = await sb.from('reviews').insert([{ name, travel_place: place, rating, message }]);
    btn.disabled = false;
    btn.innerHTML = '<svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg> Submit Review';

    if (error) { toast('Error: ' + error.message, 'error'); return; }
    toast('Review submitted! Thank you.');
    document.getElementById('rev_name').value = '';
    document.getElementById('rev_place').value = '';
    document.getElementById('rev_rating').value = '';
    document.getElementById('rev_message').value = '';
    loadReviews();
}

loadReviews();
</script>
</body>
</html>
