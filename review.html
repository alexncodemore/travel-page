<!DOCTYPE html>
<html>
<head>
    <title>Travel Reviews</title>
</head>
<body>

<input id="name" placeholder="Name"><br><br>
<input id="travel_place" placeholder="Travel Place"><br><br>

<select id="rating">
    <option value="">Select Rating</option>
    <option value="1">1 Star</option>
    <option value="2">2 Stars</option>
    <option value="3">3 Stars</option>
    <option value="4">4 Stars</option>
    <option value="5">5 Stars</option>
</select><br><br>

<textarea id="message" placeholder="Message"></textarea><br><br>

<button onclick="submitReview()">Submit Review</button>
<button onclick="loadReviews()">Load Reviews</button>

<div id="reviews"></div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<script>
const supabaseClient = window.supabase.createClient(
    "https://eyekpbzcdouhkquqjjae.supabase.co",
    "sb_publishable_hONe7ntkTZaGeyFsLV0iMQ_9aTXtOBE"
);

async function submitReview() {
    const name = document.getElementById("name").value;
    const travel_place = document.getElementById("travel_place").value;
    const rating = parseInt(document.getElementById("rating").value);
    const message = document.getElementById("message").value;

    if (!name || !travel_place || !rating) {
        alert("Please fill all required fields");
        return;
    }

    const { data, error } = await supabaseClient
        .from('reviews')
        .insert([{ name, travel_place, rating, message }]);

    if (error) {
        alert("Error: " + error.message);
    } else {
        alert("Review submitted successfully!");
        document.getElementById("name").value = "";
        document.getElementById("travel_place").value = "";
        document.getElementById("rating").value = "";
        document.getElementById("message").value = "";
        loadReviews();
    }
}

async function loadReviews() {
    const { data, error } = await supabaseClient
        .from('reviews')
        .select('*')
        .order('created_at', { ascending: false });

    if (error) {
        alert("Error loading reviews: " + error.message);
        return;
    }

    const reviewsDiv = document.getElementById("reviews");
    
    if (!data || data.length === 0) {
        reviewsDiv.innerHTML = "<h3>No reviews yet</h3>";
        return;
    }

    let html = "<h2>Reviews</h2>";
    for (let review of data) {
        html += `
            <div style="border:1px solid #ccc; margin:10px 0; padding:10px;">
                <strong>${review.name}</strong> visited <strong>${review.travel_place}</strong><br>
                Rating: ${"★".repeat(review.rating)}${"☆".repeat(5-review.rating)} (${review.rating}/5)<br>
                Message: ${review.message || "No message"}<br>
                <small>${new Date(review.created_at).toLocaleString()}</small>
            </div>
        `;
    }
    reviewsDiv.innerHTML = html;
}

// Load reviews on page load
loadReviews();
</script>

</body>
</html>
