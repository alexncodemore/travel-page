<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — Wanderlust Travel</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --cream: #faf7f2; --sand: #f0ebe0; --terracotta: #c4622d; --terracotta-dark: #a04e22;
            --forest: #2d4a3e; --forest-light: #3d6b5c; --gold: #c9952a; --gold-light: #e8b84b;
            --charcoal: #1c1c1e; --mid: #5a5a5a; --light: #9a9a9a; --border: #e0d9ce;
            --white: #ffffff; --success: #2d7a4f; --error: #c0392b;
        }
        body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--charcoal); min-height: 100vh; }

        /* LOGIN SCREEN */
        #loginScreen {
            position: fixed; inset: 0; z-index: 999;
            background: linear-gradient(160deg, var(--forest) 0%, #1a3328 100%);
            display: flex; align-items: center; justify-content: center;
            padding: 1.5rem;
        }
        .login-card {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 24px; padding: 2.5rem;
            width: 100%; max-width: 380px;
            backdrop-filter: blur(16px);
        }
        .login-logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem; color: var(--white);
            margin-bottom: 0.25rem;
        }
        .login-logo span { color: var(--gold-light); }
        .login-subtitle { color: rgba(255,255,255,0.5); font-size: 0.85rem; margin-bottom: 2rem; }
        .login-label { display: block; color: rgba(255,255,255,0.7); font-size: 0.78rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.4rem; }
        .login-input {
            width: 100%; padding: 0.75rem 1rem;
            background: rgba(255,255,255,0.08); border: 1.5px solid rgba(255,255,255,0.15);
            border-radius: 10px; color: var(--white);
            font-family: 'DM Sans', sans-serif; font-size: 0.9rem;
            outline: none; margin-bottom: 1rem;
            transition: border-color 0.2s;
        }
        .login-input::placeholder { color: rgba(255,255,255,0.3); }
        .login-input:focus { border-color: var(--gold-light); }
        .login-btn {
            width: 100%; padding: 0.85rem; border-radius: 10px;
            background: var(--terracotta); color: var(--white);
            font-family: 'DM Sans', sans-serif; font-size: 0.95rem; font-weight: 700;
            border: none; cursor: pointer; transition: background 0.2s;
        }
        .login-btn:hover { background: var(--terracotta-dark); }
        .login-error {
            background: rgba(192,57,43,0.15); border: 1px solid rgba(192,57,43,0.3);
            color: #f5b7b1; padding: 0.65rem 0.9rem; border-radius: 8px;
            font-size: 0.85rem; margin-top: 0.75rem; display: none;
        }

        /* ADMIN LAYOUT */
        #adminApp { display: none; }
        .admin-header {
            background: var(--forest); color: var(--white);
            padding: 0 2rem; height: 60px;
            display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; z-index: 50;
        }
        .admin-logo { font-family: 'Playfair Display', serif; font-size: 1.2rem; }
        .admin-logo span { color: var(--gold-light); }
        .logout-btn {
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            color: var(--white); padding: 0.4rem 1rem; border-radius: 50px;
            font-size: 0.8rem; font-weight: 600; cursor: pointer;
            display: flex; align-items: center; gap: 0.4rem; transition: background 0.2s;
        }
        .logout-btn:hover { background: rgba(255,255,255,0.2); }
        .admin-main { padding: 2rem; max-width: 1400px; margin: 0 auto; }

        /* TABS */
        .tabs { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 2rem; }
        .tab-btn {
            padding: 0.55rem 1.1rem; border-radius: 50px;
            background: var(--white); border: 1.5px solid var(--border);
            font-family: 'DM Sans', sans-serif; font-size: 0.875rem; font-weight: 600;
            color: var(--mid); cursor: pointer; transition: all 0.2s;
            display: flex; align-items: center; gap: 0.4rem;
        }
        .tab-btn.active { background: var(--forest); border-color: var(--forest); color: var(--white); }
        .tab-btn:hover:not(.active) { border-color: var(--forest); color: var(--forest); }
        .tab-badge {
            background: var(--terracotta); color: var(--white);
            font-size: 0.7rem; font-weight: 700; padding: 0.1rem 0.45rem;
            border-radius: 50px; min-width: 18px; text-align: center;
        }
        .tab-badge.active-badge { background: rgba(255,255,255,0.3); }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        /* CARDS */
        .card { background: var(--white); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; margin-bottom: 1.5rem; }
        .card-header { padding: 1.1rem 1.4rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
        .card-header h3 { font-family: 'Playfair Display', serif; font-size: 1.05rem; }
        .card-body { padding: 1.4rem; }

        /* FORM */
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .form-group { margin-bottom: 0.75rem; }
        .form-group.full { grid-column: 1 / -1; }
        label { display: block; font-size: 0.78rem; font-weight: 600; color: var(--charcoal); margin-bottom: 0.35rem; text-transform: uppercase; letter-spacing: 0.04em; }
        input, textarea, select {
            width: 100%; padding: 0.65rem 0.9rem;
            border: 1.5px solid var(--border); border-radius: 8px;
            font-family: 'DM Sans', sans-serif; font-size: 0.875rem;
            color: var(--charcoal); background: var(--cream); outline: none;
            transition: border-color 0.2s;
        }
        input:focus, textarea:focus, select:focus { border-color: var(--forest); }
        textarea { min-height: 80px; resize: vertical; }
        .btn { padding: 0.6rem 1.4rem; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 0.875rem; font-weight: 600; border: none; cursor: pointer; display: inline-flex; align-items: center; gap: 0.4rem; transition: 0.2s; }
        .btn-primary { background: var(--forest); color: var(--white); }
        .btn-primary:hover { background: var(--forest-light); }
        .btn-danger { background: #fef0f0; color: var(--error); border: 1px solid #f5b7b1; }
        .btn-danger:hover { background: var(--error); color: var(--white); }
        .btn-ghost { background: var(--sand); color: var(--mid); }
        .btn-ghost:hover { background: var(--border); }

        /* TABLE */
        .table-wrap { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; min-width: 600px; }
        thead th { background: var(--forest); color: var(--white); padding: 0.7rem 0.9rem; text-align: left; font-weight: 600; white-space: nowrap; }
        tbody td { padding: 0.7rem 0.9rem; border-bottom: 1px solid var(--border); vertical-align: middle; }
        tbody tr:last-child td { border-bottom: none; }
        tbody tr:hover { background: var(--cream); }
        .badge { display: inline-block; padding: 0.2rem 0.6rem; border-radius: 50px; font-size: 0.75rem; font-weight: 700; }
        .badge-paid { background: #f0faf4; color: var(--success); border: 1px solid #a8d8b9; }
        .badge-pending { background: #fef0f0; color: var(--error); border: 1px solid #f5b7b1; }
        .empty-state { padding: 3rem; text-align: center; color: var(--light); font-size: 0.9rem; }
        .loading-dots { display: flex; gap: 0.4rem; justify-content: center; padding: 2rem; }
        .loading-dots span { width: 8px; height: 8px; border-radius: 50%; background: var(--border); animation: bounce 1.2s infinite; }
        .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-6px);background:var(--terracotta)} }

        /* PRODUCT LIST */
        .product-row { display: flex; align-items: center; gap: 1rem; padding: 0.9rem 0; border-bottom: 1px solid var(--border); }
        .product-row:last-child { border-bottom: none; }
        .product-thumb { width: 56px; height: 56px; border-radius: 8px; object-fit: cover; flex-shrink: 0; background: var(--sand); }
        .product-meta { flex: 1; }
        .product-meta strong { display: block; font-size: 0.9rem; }
        .product-meta span { font-size: 0.8rem; color: var(--mid); }
        .product-price-tag { font-size: 1rem; font-weight: 700; color: var(--forest); white-space: nowrap; }
        .product-actions { display: flex; gap: 0.4rem; }

        /* STATS ROW */
        .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
        .stat-card { background: var(--white); border: 1px solid var(--border); border-radius: 12px; padding: 1.1rem 1.4rem; }
        .stat-card .label { font-size: 0.75rem; font-weight: 600; color: var(--light); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.35rem; }
        .stat-card .value { font-size: 1.7rem; font-family: 'Playfair Display', serif; color: var(--charcoal); }

        /* TOAST */
        .toast-container { position: fixed; bottom: 2rem; right: 2rem; z-index: 999; display: flex; flex-direction: column; gap: 0.5rem; }
        .toast { min-width: 260px; padding: 0.85rem 1.1rem; border-radius: 10px; font-size: 0.875rem; display: flex; gap: 0.6rem; animation: toastIn 0.3s ease; box-shadow: 0 4px 16px rgba(0,0,0,0.12); }
        .toast-success { background: #f0faf4; border: 1px solid #a8d8b9; color: var(--success); }
        .toast-error { background: #fef0f0; border: 1px solid #f5b7b1; color: var(--error); }
        @keyframes toastIn { from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)} }

        @media (max-width: 640px) {
            .form-grid { grid-template-columns: 1fr; }
            .admin-main { padding: 1rem; }
        }
    </style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen">
    <div class="login-card">
        <div class="login-logo">Wander<span>lust</span></div>
        <div class="login-subtitle">Admin Portal — Restricted Access</div>
        <label class="login-label" for="adminId">Admin ID</label>
        <input class="login-input" type="text" id="adminId" placeholder="Enter admin ID" autocomplete="off">
        <label class="login-label" for="adminPass">Password</label>
        <input class="login-input" type="password" id="adminPass" placeholder="Enter password" onkeydown="if(event.key==='Enter')doLogin()">
        <button class="login-btn" onclick="doLogin()">Sign In</button>
        <div class="login-error" id="loginError">Incorrect credentials. Please try again.</div>
    </div>
</div>

<!-- ADMIN APP -->
<div id="adminApp">
    <header class="admin-header">
        <div class="admin-logo">Wander<span>lust</span> Admin</div>
        <button class="logout-btn" onclick="doLogout()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg>
            Logout
        </button>
    </header>

    <main class="admin-main">
        <!-- Stats Row -->
        <div class="stats-row" id="statsRow">
            <div class="stat-card"><div class="label">Products</div><div class="value" id="statProducts">—</div></div>
            <div class="stat-card"><div class="label">Orders</div><div class="value" id="statOrders">—</div></div>
            <div class="stat-card"><div class="label">Itinerary Requests</div><div class="value" id="statItinerary">—</div></div>
            <div class="stat-card"><div class="label">Reviews</div><div class="value" id="statReviews">—</div></div>
            <div class="stat-card"><div class="label">Contacts</div><div class="value" id="statContacts">—</div></div>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('products',this)">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2z"/></svg>
                Products
                <span class="tab-badge" id="badgeProducts">0</span>
            </button>
            <button class="tab-btn" onclick="switchTab('orders',this)">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M7 18c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm10 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm-8.9-5h9.45c.75 0 1.41-.41 1.75-1.03L21 7H6L4.27 3H1v2h2l3.6 7.59L5.25 15c-.16.28-.25.61-.25.96C5 17.1 5.9 18 7 18h14v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12z"/></svg>
                Orders
                <span class="tab-badge" id="badgeOrders">0</span>
            </button>
            <button class="tab-btn" onclick="switchTab('itinerary',this)">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11z"/></svg>
                Itinerary
                <span class="tab-badge" id="badgeItinerary">0</span>
            </button>
            <button class="tab-btn" onclick="switchTab('reviews',this)">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01z"/></svg>
                Reviews
                <span class="tab-badge" id="badgeReviews">0</span>
            </button>
            <button class="tab-btn" onclick="switchTab('contacts',this)">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
                Contacts
                <span class="tab-badge" id="badgeContacts">0</span>
            </button>
        </div>

        <!-- PRODUCTS TAB -->
        <div class="tab-panel active" id="tab-products">
            <div class="card" style="margin-bottom:1.5rem">
                <div class="card-header"><h3>Add New Product</h3></div>
                <div class="card-body">
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Title *</label>
                            <input type="text" id="prod_title" placeholder="Package title">
                        </div>
                        <div class="form-group">
                            <label>Price (₹) *</label>
                            <input type="number" id="prod_price" step="0.01" placeholder="0.00">
                        </div>
                        <div class="form-group full">
                            <label>Description</label>
                            <textarea id="prod_desc" placeholder="Package description"></textarea>
                        </div>
                        <div class="form-group">
                            <label>Product Image</label>
                            <input type="file" id="prod_img" accept="image/*">
                        </div>
                        <div class="form-group">
                            <label>PDF Document</label>
                            <input type="file" id="prod_pdf" accept=".pdf">
                        </div>
                    </div>
                    <button class="btn btn-primary" onclick="addProduct(this)">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
                        Add Product
                    </button>
                </div>
            </div>
            <div class="card">
                <div class="card-header"><h3>Products</h3></div>
                <div class="card-body" id="productsList">
                    <div class="loading-dots"><span></span><span></span><span></span></div>
                </div>
            </div>
        </div>

        <!-- ORDERS TAB -->
        <div class="tab-panel" id="tab-orders">
            <div class="card">
                <div class="card-header"><h3>Product Orders</h3></div>
                <div class="table-wrap" id="ordersTable">
                    <div class="loading-dots"><span></span><span></span><span></span></div>
                </div>
            </div>
        </div>

        <!-- ITINERARY TAB -->
        <div class="tab-panel" id="tab-itinerary">
            <div class="card">
                <div class="card-header"><h3>Itinerary Requests</h3></div>
                <div class="table-wrap" id="itineraryTable">
                    <div class="loading-dots"><span></span><span></span><span></span></div>
                </div>
            </div>
        </div>

        <!-- REVIEWS TAB -->
        <div class="tab-panel" id="tab-reviews">
            <div class="card">
                <div class="card-header"><h3>Travel Reviews</h3></div>
                <div class="table-wrap" id="reviewsTable">
                    <div class="loading-dots"><span></span><span></span><span></span></div>
                </div>
            </div>
        </div>

        <!-- CONTACTS TAB -->
        <div class="tab-panel" id="tab-contacts">
            <div class="card">
                <div class="card-header"><h3>Contact Requests</h3></div>
                <div class="table-wrap" id="contactsTable">
                    <div class="loading-dots"><span></span><span></span><span></span></div>
                </div>
            </div>
        </div>
    </main>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
const sb = window.supabase.createClient(
    "https://eyekpbzcdouhkquqjjae.supabase.co",
    "sb_publishable_hONe7ntkTZaGeyFsLV0iMQ_9aTXtOBE"
);

// ── CREDENTIALS (change these) ────────────────────────────────────────────────
const ADMIN_ID = "admin";
const ADMIN_PASS = "wanderlust@2025";
// ─────────────────────────────────────────────────────────────────────────────

let sessionActive = false;

function doLogin() {
    const id = document.getElementById('adminId').value;
    const pw = document.getElementById('adminPass').value;
    const err = document.getElementById('loginError');
    if (id === ADMIN_ID && pw === ADMIN_PASS) {
        sessionStorage.setItem('wl_admin', 'true');
        sessionActive = true;
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('adminApp').style.display = 'block';
        loadAll();
    } else {
        err.style.display = 'block';
        document.getElementById('adminId').value = '';
        document.getElementById('adminPass').value = '';
        setTimeout(() => err.style.display = 'none', 3000);
    }
}

function doLogout() {
    sessionStorage.removeItem('wl_admin');
    sessionActive = false;
    document.getElementById('adminApp').style.display = 'none';
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('adminId').value = '';
    document.getElementById('adminPass').value = '';
}

function checkSession() {
    if (sessionStorage.getItem('wl_admin') === 'true') {
        sessionActive = true;
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('adminApp').style.display = 'block';
        loadAll();
    }
}

// ── TABS ──────────────────────────────────────────────────────────────────────
function switchTab(name, btn) {
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    btn.classList.add('active');
}

// ── TOAST ─────────────────────────────────────────────────────────────────────
function toast(msg, type = 'success') {
    const c = document.getElementById('toastContainer');
    const t = document.createElement('div');
    t.className = `toast toast-${type}`;
    t.innerHTML = `<span>${type === 'success' ? '✓' : '✕'}</span><span>${msg}</span>`;
    c.appendChild(t);
    setTimeout(() => t.remove(), 3500);
}

function esc(t) {
    if (!t) return '';
    const d = document.createElement('div');
    d.textContent = t;
    return d.innerHTML;
}

// ── LOAD ALL ──────────────────────────────────────────────────────────────────
function loadAll() {
    loadProducts();
    loadOrders();
    loadItinerary();
    loadReviews();
    loadContacts();
}

// ── ADD PRODUCT ───────────────────────────────────────────────────────────────
async function addProduct(btn) {
    const title = document.getElementById('prod_title').value.trim();
    const price = parseFloat(document.getElementById('prod_price').value);
    const desc = document.getElementById('prod_desc').value.trim();
    const imgFile = document.getElementById('prod_img').files[0];
    const pdfFile = document.getElementById('prod_pdf').files[0];

    if (!title || !price) { toast('Please fill title and price', 'error'); return; }

    btn.disabled = true; btn.textContent = 'Saving...';

    let imageUrl = null, pdfUrl = null;

    if (imgFile) {
        const ext = imgFile.name.split('.').pop();
        const path = `products/img_${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;
        const { error: ie } = await sb.storage.from('images').upload(path, imgFile);
        if (ie) { toast('Image upload failed: ' + ie.message, 'error'); btn.disabled = false; btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg> Add Product'; return; }
        imageUrl = sb.storage.from('images').getPublicUrl(path).data.publicUrl;
    }

    if (pdfFile) {
        const path = `products/pdf_${Date.now()}_${Math.random().toString(36).slice(2)}.pdf`;
        const { error: pe } = await sb.storage.from('pdfs').upload(path, pdfFile);
        if (pe) { toast('PDF upload failed: ' + pe.message, 'error'); btn.disabled = false; btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg> Add Product'; return; }
        pdfUrl = sb.storage.from('pdfs').getPublicUrl(path).data.publicUrl;
    }

    const { error } = await sb.from('products').insert([{ title, description: desc, price, image_url: imageUrl, pdf_url: pdfUrl }]);
    btn.disabled = false;
    btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg> Add Product';

    if (error) { toast('Error: ' + error.message, 'error'); return; }
    toast('Product added successfully!');
    ['prod_title','prod_price','prod_desc'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('prod_img').value = '';
    document.getElementById('prod_pdf').value = '';
    loadProducts();
}

// ── LOAD PRODUCTS ─────────────────────────────────────────────────────────────
async function loadProducts() {
    const { data, error } = await sb.from('products').select('*').order('created_at', { ascending: false });
    const div = document.getElementById('productsList');
    document.getElementById('badgeProducts').textContent = data?.length || 0;
    document.getElementById('statProducts').textContent = data?.length || 0;

    if (error || !data || data.length === 0) {
        div.innerHTML = '<div class="empty-state">No products yet.</div>';
        return;
    }
    div.innerHTML = data.map(p => `
        <div class="product-row">
            ${p.image_url ? `<img class="product-thumb" src="${p.image_url}" onerror="this.style.display='none'" alt="">` : '<div class="product-thumb" style="display:flex;align-items:center;justify-content:center;color:var(--light)"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2z"/></svg></div>'}
            <div class="product-meta">
                <strong>${esc(p.title)}</strong>
                <span>${esc(p.description)?.substring(0,60) || 'No description'}${(p.description || '').length > 60 ? '…' : ''}</span>
                ${p.pdf_url ? `<span style="display:block;margin-top:2px"><a href="${p.pdf_url}" target="_blank" style="color:var(--terracotta);font-size:0.75rem;text-decoration:none">View PDF</a></span>` : ''}
            </div>
            <div class="product-price-tag">₹${parseFloat(p.price).toFixed(0)}</div>
            <div class="product-actions">
                <button class="btn btn-danger" onclick="deleteProduct(${p.id})">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
                    Delete
                </button>
            </div>
        </div>`).join('');
}

async function deleteProduct(id) {
    if (!confirm('Delete this product?')) return;
    const { error } = await sb.from('products').delete().eq('id', id);
    if (error) { toast('Error: ' + error.message, 'error'); return; }
    toast('Product deleted.');
    loadProducts();
}
