<!DOCTYPE html>
<html>
<head>
    <title>Product Management & Admin Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #f5f5f5; }
        .form-container { border: 1px solid #ccc; padding: 20px; margin-bottom: 20px; border-radius: 5px; background: white; }
        .product-card { border: 1px solid #ddd; padding: 15px; margin: 10px 0; border-radius: 5px; background: white; }
        input, textarea, select { width: 100%; padding: 8px; margin: 5px 0 15px 0; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { background: #007bff; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; margin-right: 10px; }
        button:hover { background: #0056b3; }
        .delete-btn { background: #dc3545; }
        .delete-btn:hover { background: #c82333; }
        .view-btn { background: #28a745; }
        .view-btn:hover { background: #218838; }
        img { max-width: 100px; margin-top: 10px; }
        .product-image { max-width: 100px; margin-right: 10px; }
        .table-container { 
            background: white; 
            padding: 20px; 
            margin-bottom: 20px; 
            border-radius: 5px;
            overflow-x: auto;
        }
        table { 
            width: 100%; 
            border-collapse: collapse; 
            margin-top: 10px;
        }
        th, td { 
            border: 1px solid #ddd; 
            padding: 10px; 
            text-align: left; 
        }
        th { 
            background: #007bff; 
            color: white; 
        }
        tr:nth-child(even) { 
            background: #f9f9f9; 
        }
        .section-title {
            background: #007bff;
            color: white;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
        }
        .delete-review-btn {
            background: #dc3545;
            color: white;
            padding: 5px 10px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
        }
        .delete-review-btn:hover {
            background: #c82333;
        }
        .status-paid {
            color: #28a745;
            font-weight: bold;
        }
        .status-pending {
            color: #dc3545;
            font-weight: bold;
        }
    </style>
</head>
<body>

<h1>Admin Dashboard</h1>

<!-- Product Management Section -->
<div class="form-container">
    <h2>Add New Product</h2>
    
    <label>Title *</label>
    <input type="text" id="title" placeholder="Product Title">
    
    <label>Description</label>
    <textarea id="description" rows="3" placeholder="Product Description"></textarea>
    
    <label>Price * (₹)</label>
    <input type="number" id="price" step="0.01" placeholder="0.00">
    
    <label>Image</label>
    <input type="file" id="productImage" accept="image/*">
    
    <label>PDF Document</label>
    <input type="file" id="productPdf" accept=".pdf">
    
    <button onclick="addProduct()">Add Product</button>
</div>

<h2>Products List</h2>
<div id="productsList"></div>

<!-- Contact Requests Table -->
<div class="table-container">
    <h2 class="section-title">Contact Requests</h2>
    <div id="contactRequestsTable"></div>
</div>

<!-- Itinerary Requests Table -->
<div class="table-container">
    <h2 class="section-title">Itinerary Requests</h2>
    <div id="itineraryRequestsTable"></div>
</div>

<!-- Product Orders Table -->
<div class="table-container">
    <h2 class="section-title">Product Orders</h2>
    <div id="productOrdersTable"></div>
</div>

<!-- Reviews Table -->
<div class="table-container">
    <h2 class="section-title">Travel Reviews</h2>
    <div id="reviewsTable"></div>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<script>
const supabaseClient = window.supabase.createClient(
    "https://eyekpbzcdouhkquqjjae.supabase.co",
    "sb_publishable_hONe7ntkTZaGeyFsLV0iMQ_9aTXtOBE"
);

// Add new product
async function addProduct() {
    const title = document.getElementById("title").value;
    const description = document.getElementById("description").value;
    const price = parseFloat(document.getElementById("price").value);
    const imageFile = document.getElementById("productImage").files[0];
    const pdfFile = document.getElementById("productPdf").files[0];

    if (!title || !price) {
        alert("Please fill title and price");
        return;
    }

    let imageUrl = null;
    let pdfUrl = null;

    // Upload image if selected
    if (imageFile) {
        const imageExt = imageFile.name.split('.').pop();
        const imageName = `product_${Date.now()}_${Math.random().toString(36).substring(7)}.${imageExt}`;
        const imagePath = `products/${imageName}`;

        const { error: imageError } = await supabaseClient.storage
            .from('images')
            .upload(imagePath, imageFile);

        if (imageError) {
            alert("Error uploading image: " + imageError.message);
            return;
        }

        const { data: imageUrlData } = supabaseClient.storage
            .from('images')
            .getPublicUrl(imagePath);
        
        imageUrl = imageUrlData.publicUrl;
    }

    // Upload PDF if selected
    if (pdfFile) {
        const pdfName = `product_${Date.now()}_${Math.random().toString(36).substring(7)}.pdf`;
        const pdfPath = `products/${pdfName}`;

        const { error: pdfError } = await supabaseClient.storage
            .from('pdfs')
            .upload(pdfPath, pdfFile);

        if (pdfError) {
            alert("Error uploading PDF: " + pdfError.message);
            return;
        }

        const { data: pdfUrlData } = supabaseClient.storage
            .from('pdfs')
            .getPublicUrl(pdfPath);
        
        pdfUrl = pdfUrlData.publicUrl;
    }

    // Insert product into database
    const { data, error } = await supabaseClient
        .from('products')
        .insert([{
            title: title,
            description: description,
            price: price,
            image_url: imageUrl,
            pdf_url: pdfUrl
        }]);

    if (error) {
        alert("Error adding product: " + error.message);
        return;
    }

    alert("Product added successfully!");
    
    // Clear form
    document.getElementById("title").value = "";
    document.getElementById("description").value = "";
    document.getElementById("price").value = "";
    document.getElementById("productImage").value = "";
    document.getElementById("productPdf").value = "";
    
    // Reload products
    loadProducts();
}

// Load all products
async function loadProducts() {
    try {
        const { data, error } = await supabaseClient
            .from('products')
            .select('*')
            .order('created_at', { ascending: false });

        if (error) {
            console.error("Error loading products:", error);
            document.getElementById("productsList").innerHTML = "<p>Error loading products</p>";
            return;
        }

        const productsDiv = document.getElementById("productsList");
        
        if (!data || data.length === 0) {
            productsDiv.innerHTML = "<p>No products found</p>";
            return;
        }

        let html = "";
        for (let product of data) {
            html += `
                <div class="product-card">
                    <h3>${escapeHtml(product.title)}</h3>
                    <p><strong>Price:</strong> ₹${parseFloat(product.price).toFixed(2)}</p>
                    <p><strong>Description:</strong> ${escapeHtml(product.description) || "No description"}</p>
                    ${product.image_url ? `
                        <div>
                            <strong>Image:</strong><br>
                            <img src="${product.image_url}" class="product-image" onerror="this.style.display='none'">
                            <br>
                            <a href="${product.image_url}" target="_blank">View full image</a>
                        </div>
                    ` : ""}
                    ${product.pdf_url ? `
                        <div>
                            <strong>PDF Document:</strong><br>
                            <a href="${product.pdf_url}" target="_blank">Download/View PDF</a>
                        </div>
                    ` : ""}
                    <small>Added: ${new Date(product.created_at).toLocaleString()}</small><br>
                    <button class="delete-btn" onclick="deleteProduct(${product.id})">Delete</button>
                </div>
            `;
        }
        productsDiv.innerHTML = html;
    } catch (err) {
        console.error("Error in loadProducts:", err);
        document.getElementById("productsList").innerHTML = "<p>Error loading products</p>";
    }
}

// Delete product
async function deleteProduct(id) {
    if (!confirm("Are you sure you want to delete this product?")) {
        return;
    }

    const { error } = await supabaseClient
        .from('products')
        .delete()
        .eq('id', id);

    if (error) {
        alert("Error deleting product: " + error.message);
    } else {
        alert("Product deleted successfully!");
        loadProducts();
    }
}

// Load contact requests
async function loadContactRequests() {
    try {
        const { data, error } = await supabaseClient
            .from('contact_messages')
            .select('*')
            .order('created_at', { ascending: false });

        if (error) {
            console.error("Error loading contact requests:", error);
            document.getElementById("contactRequestsTable").innerHTML = "<p>Error loading contact requests</p>";
            return;
        }

        const container = document.getElementById("contactRequestsTable");
        
        if (!data || data.length === 0) {
            container.innerHTML = "<p>No contact requests found</p>";
            return;
        }

        let html = `
            <table>
                <thead>
                    <tr><th>ID</th><th>Name</th><th>Email</th><th>Contact</th><th>Message</th><th>Date</th></tr>
                </thead>
                <tbody>
        `;
        
        for (let request of data) {
            html += `
                <tr>
                    <td>${request.id}</td>
                    <td>${escapeHtml(request.name)}</td>
                    <td>${escapeHtml(request.email)}</td>
                    <td>${escapeHtml(request.contact)}</td>
                    <td>${escapeHtml(request.message) || '-'}</td>
                    <td>${new Date(request.created_at).toLocaleString()}</td>
                </tr>
            `;
        }
        
        html += `</tbody></table>`;
        container.innerHTML = html;
    } catch (err) {
        console.error("Error in loadContactRequests:", err);
    }
}

// Load itinerary requests
async function loadItineraryRequests() {
    try {
        const { data, error } = await supabaseClient
            .from('itinerary_requests')
            .select('*')
            .order('created_at', { ascending: false });

        if (error) {
            console.error("Error loading itinerary requests:", error);
            document.getElementById("itineraryRequestsTable").innerHTML = "<p>Error loading itinerary requests</p>";
            return;
        }

        const container = document.getElementById("itineraryRequestsTable");
        
        if (!data || data.length === 0) {
            container.innerHTML = "<p>No itinerary requests found</p>";
            return;
        }

        let html = `
            <table>
                <thead>
                    <tr><th>ID</th><th>Full Name</th><th>Email</th><th>Phone</th><th>Trip Type</th><th>Destination</th><th>Days</th><th>People</th><th>Budget</th><th>Travel Dates</th><th>Travel Style</th><th>Food Preference</th><th>Kids</th><th>Special Requirements</th><th>Date</th></tr>
                </thead>
                <tbody>
        `;
        
        for (let request of data) {
            html += `
                <tr>
                    <td>${request.id}</td>
                    <td>${escapeHtml(request.full_name)}</td>
                    <td>${escapeHtml(request.email)}</td>
                    <td>${escapeHtml(request.phone)}</td>
                    <td>${escapeHtml(request.trip_type)}</td>
                    <td>${escapeHtml(request.destination)}</td>
                    <td>${request.days}</td>
                    <td>${request.people}</td>
                    <td>${request.budget ? '₹' + request.budget : '-'}</td>
                    <td>${escapeHtml(request.travel_dates) || '-'}</td>
                    <td>${escapeHtml(request.travel_style) || '-'}</td>
                    <td>${escapeHtml(request.food_preference) || '-'}</td>
                    <td>${escapeHtml(request.kids_travelling) || '-'}</td>
                    <td>${escapeHtml(request.special_requirements) || '-'}</td>
                    <td>${new Date(request.created_at).toLocaleString()}</td>
                </tr>
            `;
        }
        
        html += `</tbody></table>`;
        container.innerHTML = html;
    } catch (err) {
        console.error("Error in loadItineraryRequests:", err);
    }
}

// Load product orders
async function loadProductOrders() {
    try {
        const { data, error } = await supabaseClient
            .from('product_orders')
            .select('*')
            .order('created_at', { ascending: false });

        if (error) {
            console.error("Error loading product orders:", error);
            document.getElementById("productOrdersTable").innerHTML = "<p>Error loading product orders</p>";
            return;
        }

        const container = document.getElementById("productOrdersTable");
        
        if (!data || data.length === 0) {
            container.innerHTML = "<p>No product orders found</p>";
            return;
        }

        let html = `
            <table>
                <thead>
                    <tr><th>ID</th><th>Product Name</th><th>Price</th><th>Buyer Name</th><th>Email</th><th>Phone</th><th>Travelers</th><th>Message</th><th>Payment Status</th><th>Date</th></tr>
                </thead>
                <tbody>
        `;
        
        for (let order of data) {
            html += `
                <tr>
                    <td>${order.id}</td>
                    <td>${escapeHtml(order.product_name)}</td>
                    <td>₹${order.product_price}</td>
                    <td>${escapeHtml(order.buyer_name)}</td>
                    <td>${escapeHtml(order.buyer_email)}</td>
                    <td>${escapeHtml(order.buyer_phone)}</td>
                    <td>${order.travelers}</td>
                    <td>${escapeHtml(order.message) || '-'}</td>
                    <td class="${order.payment_status === 'Paid' ? 'status-paid' : 'status-pending'}">${order.payment_status || 'Pending'}</td>
                    <td>${new Date(order.created_at).toLocaleString()}</td>
                </tr>
            `;
        }
        
        html += `</tbody></table>`;
        container.innerHTML = html;
    } catch (err) {
        console.error("Error in loadProductOrders:", err);
    }
}

// Load reviews with delete option
async function loadReviews() {
    try {
        const { data, error } = await supabaseClient
            .from('reviews')
            .select('*')
            .order('created_at', { ascending: false });

        if (error) {
            console.error("Error loading reviews:", error);
            document.getElementById("reviewsTable").innerHTML = "<p>Error loading reviews</p>";
            return;
        }

        const container = document.getElementById("reviewsTable");
        
        if (!data || data.length === 0) {
            container.innerHTML = "<p>No reviews found</p>";
            return;
        }

        let html = `
            <table>
                <thead>
                    <tr><th>ID</th><th>Name</th><th>Travel Place</th><th>Rating</th><th>Message</th><th>Date</th><th>Action</th></tr>
                </thead>
                <tbody>
        `;
        
        for (let review of data) {
            html += `
                <tr>
                    <td>${review.id}</td>
                    <td>${escapeHtml(review.name)}</td>
                    <td>${escapeHtml(review.travel_place)}</td>
                    <td>${"★".repeat(review.rating)}${"☆".repeat(5-review.rating)} (${review.rating}/5)</td>
                    <td>${escapeHtml(review.message) || '-'}</td>
                    <td>${new Date(review.created_at).toLocaleString()}</td>
                    <td><button class="delete-review-btn" onclick="deleteReview(${review.id})">Delete</button></td>
                </tr>
            `;
        }
        
        html += `</tbody></table>`;
        container.innerHTML = html;
    } catch (err) {
        console.error("Error in loadReviews:", err);
    }
}

// Delete review
async function deleteReview(id) {
    if (!confirm("Are you sure you want to delete this review?")) {
        return;
    }

    const { error } = await supabaseClient
        .from('reviews')
        .delete()
        .eq('id', id);

    if (error) {
        alert("Error deleting review: " + error.message);
    } else {
        alert("Review deleted successfully!");
        loadReviews();
    }
}

// Helper function to escape HTML
function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// Load all data on page load
document.addEventListener('DOMContentLoaded', () => {
    loadProducts();
    loadContactRequests();
    loadItineraryRequests();
    loadProductOrders();
    loadReviews();
});
</script>

</body>
</html>
