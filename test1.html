<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EmailJS Diagnostic</title>
    <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
</head>
<body>
    <h1>EmailJS Diagnostic Tool</h1>
    
    <div id="diagnostic"></div>
    
    <script>
        async function runDiagnostic() {
            const output = document.getElementById("diagnostic");
            output.innerHTML = "<h2>Running Diagnostics...</h2>";
            
            // Check 1: EmailJS initialization
            output.innerHTML += "<h3>1. Checking EmailJS Initialization...</h3>";
            try {
                emailjs.init("7rgj4t_06JrmsxgHC");
                output.innerHTML += "<p style='color: green'>✅ EmailJS initialized successfully</p>";
            } catch(e) {
                output.innerHTML += `<p style='color: red'>❌ EmailJS init failed: ${e.message}</p>`;
            }
            
            // Check 2: Test API call
            output.innerHTML += "<h3>2. Testing EmailJS API...</h3>";
            
            const testParams = {
                name: "Diagnostic Test",
                email: "diagnostic@test.com",
                message: "This is a diagnostic test from Wanderers Itinerary.",
                payment_id: "DIAG_123",
                amount: "100",
                product_name: "Diagnostic Test",
                download_link: "https://example.com/test.pdf"
            };
            
            try {
                const response = await emailjs.send("service_8o8nozh", "template_xui60z6", testParams);
                output.innerHTML += `<p style='color: green'>✅ API call successful! Status: ${response.status}</p>`;
                output.innerHTML += `<p>Response: ${JSON.stringify(response)}</p>`;
            } catch(e) {
                output.innerHTML += `<p style='color: red'>❌ API call failed:</p>`;
                output.innerHTML += `<pre style='background: #ffeeee; padding: 10px;'>${JSON.stringify(e, null, 2)}</pre>`;
                
                // Provide troubleshooting steps
                output.innerHTML += `
                    <div style="background: #fff3e0; padding: 15px; margin-top: 20px;">
                        <h3>🔧 Troubleshooting Steps:</h3>
                        <ol>
                            <li>Go to <a href="https://dashboard.emailjs.com/" target="_blank">EmailJS Dashboard</a></li>
                            <li>Check if your service "service_8o8nozh" exists and is active</li>
                            <li>Check if template "template_xui60z6" exists</li>
                            <li>Verify the template has these variables: {{name}}, {{email}}, {{message}}, {{payment_id}}, {{amount}}, {{product_name}}, {{download_link}}</li>
                            <li>Check your EmailJS account has enough quota (free tier: 200 emails/month)</li>
                            <li>Verify your public key "7rgj4t_06JrmsxgHC" matches your account</li>
                        </ol>
                        
                        <h3>📝 Required Template Variables:</h3>
                        <pre style="background: #eee; padding: 10px;">
{{name}}
{{email}}
{{message}}
{{payment_id}}
{{amount}}
{{product_name}}
{{download_link}}
                        </pre>
                        
                        <h3>🔑 Your Configuration:</h3>
                        <ul>
                            <li>Public Key: 7rgj4t_06JrmsxgHC</li>
                            <li>Service ID: service_8o8nozh</li>
                            <li>Template ID: template_xui60z6</li>
                        </ul>
                    </div>
                `;
            }
            
            // Check 3: Supabase connection
            output.innerHTML += "<h3>3. Testing Supabase Connection...</h3>";
            const supabase = window.supabase.createClient(
                "https://eyekpbzcdouhkquqjjae.supabase.co",
                "sb_publishable_hONe7ntkTZaGeyFsLV0iMQ_9aTXtOBE"
            );
            
            try {
                const { data, error } = await supabase.from('products').select('count', { count: 'exact', head: true });
                if (error) {
                    output.innerHTML += `<p style='color: red'>❌ Supabase error: ${error.message}</p>`;
                } else {
                    output.innerHTML += `<p style='color: green'>✅ Supabase connection successful</p>`;
                }
            } catch(e) {
                output.innerHTML += `<p style='color: red'>❌ Supabase connection failed: ${e.message}</p>`;
            }
        }
        
        runDiagnostic();
    </script>
</body>
</html>
